<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <title>Угадай песню по эмодзи - LoveChord</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap');
        
        :root {
            --bg-body: #1e1e2f;
            --bg-game-box: #2a2a3a;
            --bg-card: #1e1e2f;
            --text-primary: white;
            --text-secondary: #aaa;
            --btn-bg: #f5c4c4;
            --btn-hover: #e8a0a0;
            --btn-text: #333;
            --border-color: #f5c4c4;
            --accent: #ffcc00;
            --success: #00aa44;
            --success-glow: #00ff55;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            background: var(--bg-body);
            color: var(--text-primary);
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }
        
        body.light-theme {
            --bg-body: #ffe4e1;
            --bg-game-box: #ffd6d6;
            --bg-card: #ffebeb;
            --text-primary: #333;
            --text-secondary: #666;
            --btn-bg: #2a2a3a;
            --btn-hover: #3a3a4a;
            --btn-text: #f5c4c4;
            --border-color: #2a2a3a;
            --accent: #ff6b6b;
        }
        
        @keyframes achievementUnlock {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            50% { transform: scale(1.2) rotate(0deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        
        @keyframes confettiFall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
        
        @keyframes glowPulse {
            0% { box-shadow: 0 0 0 0 var(--success-glow); }
            50% { box-shadow: 0 0 20px 10px var(--success-glow); }
            100% { box-shadow: 0 0 0 0 var(--success-glow); }
        }
        
        .achievement-notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #333;
            padding: 20px 40px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 24px;
            z-index: 10000;
            animation: achievementUnlock 0.5s ease-out;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            min-width: 300px;
        }
        
        .achievement-notification .achievement-icon { font-size: 48px; display: block; margin-bottom: 10px; }
        .achievement-notification .achievement-title { font-size: 20px; margin-bottom: 5px; }
        .achievement-notification .achievement-desc { font-size: 14px; opacity: 0.9; }
        
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            position: absolute;
            z-index: 9999;
            pointer-events: none;
            animation: confettiFall 3s ease-in forwards;
        }
        
        .game-box.completed { animation: glowPulse 0.5s ease-out; }
        
        .LoveChord-container {
            position: fixed;
            top: 20px;
            left: 20px;
            text-align: center;
            z-index: 1000;
        }
        
        .LoveChord-btn {
            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            display: block;
            text-align: center;
            text-decoration: none;
        }
        
        .LoveChord-btn:hover { background: var(--btn-hover); transform: scale(1.02); }
        .LoveChord-main { display: block; font-size: 20px; font-weight: 800; font-family: 'Montserrat', sans-serif; letter-spacing: 2px; font-variant: small-caps; }
        .about-songs { display: block; font-size: 9px; text-decoration: none; margin-top: 3px; font-weight: normal; font-family: 'Montserrat', sans-serif; }

        /* ИКОНКИ ПОИСКА И УВЕДОМЛЕНИЙ */
        .search-icon {
            position: fixed;
            top: 20px;
            right: 140px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--btn-bg);
            color: var(--btn-text);
            border: 2px solid var(--border-color);
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            z-index: 1000;
        }
        .search-icon:hover { transform: scale(1.05); background: var(--btn-hover); }
        
        .notification-icon {
            position: fixed;
            top: 20px;
            right: 200px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--btn-bg);
            color: var(--btn-text);
            border: 2px solid var(--border-color);
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            z-index: 1000;
        }
        .notification-icon:hover { transform: scale(1.05); background: var(--btn-hover); }
        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4444;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .profile-icon {
            position: fixed;
            top: 20px;
            right: 80px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--btn-bg);
            color: var(--btn-text);
            border: 2px solid var(--border-color);
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            z-index: 1000;
            overflow: hidden;
        }
        
        .profile-icon:hover { transform: scale(1.05); background: var(--btn-hover); }
        .profile-icon img { width: 100%; height: 100%; object-fit: cover; }
        
        .daily-task-indicator {
            position: fixed;
            top: 20px;
            right: 260px;
            background: var(--btn-bg);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--btn-text);
        }
        
        .daily-task-indicator.completed { background: var(--success); color: white; animation: glowPulse 0.5s ease-out; }
        
        .theme-toggle-bottom {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            padding: 10px 15px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 16px;
            font-weight: 600;
            z-index: 1000;
            font-family: 'Montserrat', sans-serif;
        }
        
        .theme-toggle-bottom:hover { background: var(--btn-hover); transform: scale(1.02); }
        
        .nav-menu {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            margin-top: 60px;
            z-index: 1000;
            position: relative;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            padding-bottom: 10px;
            cursor: grab;
        }
        
        .nav-menu:active { cursor: grabbing; }
        .nav-menu::-webkit-scrollbar { height: 5px; }
        .nav-menu::-webkit-scrollbar-track { background: var(--bg-game-box); border-radius: 10px; }
        .nav-menu::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        .nav-menu::-webkit-scrollbar-thumb:hover { background: var(--btn-hover); }
        
        .nav-btn {
            background: var(--bg-game-box);
            border: 2px solid var(--border-color);
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--border-color);
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .nav-btn:hover:not(.active) { background: var(--btn-bg); color: var(--btn-text); }
        .nav-btn.active { background: var(--btn-bg); color: var(--btn-text); cursor: default; opacity: 0.7; }
        
        .category-menu {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        
        .category-btn {
            background: var(--bg-game-box);
            border: 2px solid var(--border-color);
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--border-color);
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
        }
        
        .category-btn:hover { background: var(--btn-bg); color: var(--btn-text); }
        
        .records-container {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            max-width: 800px;
            margin: 0 auto 20px auto;
        }
        
        .record-card {
            background: var(--bg-game-box);
            border-radius: 20px;
            padding: 15px 20px;
            flex: 1;
            text-align: center;
            border: 2px solid var(--border-color);
        }
        
        .record-card h3 { color: var(--border-color); font-size: 18px; margin-bottom: 10px; font-variant: small-caps; letter-spacing: 1px; }
        .record-score { font-size: 36px; font-weight: bold; color: var(--accent); }
        .record-date { font-size: 12px; color: var(--text-secondary); margin-top: 8px; }
        .record-label { font-size: 14px; color: var(--border-color); margin-top: 5px; }
        
        .game-box {
            background: var(--bg-game-box);
            max-width: 700px;
            margin: 20px auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: all 0.3s;
        }
        
        h1 {
            color: var(--border-color);
            font-family: 'Montserrat', sans-serif;
            font-variant: small-caps;
            font-weight: 800;
            letter-spacing: 2px;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .score {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--accent);
            font-family: 'Montserrat', sans-serif;
        }
        
        .emojis-container {
            font-size: 64px;
            text-align: center;
            margin: 30px 0;
            padding: 30px;
            background: var(--bg-card);
            border-radius: 30px;
            letter-spacing: 15px;
            word-break: break-word;
            line-height: 1.5;
        }
        
        .question-text {
            font-size: 20px;
            margin: 20px 0;
            color: var(--accent);
            font-weight: bold;
        }
        
        .options-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        
        .option-btn {
            background: var(--btn-bg);
            border: none;
            padding: 15px 25px;
            font-size: 16px;
            margin: 5px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s;
            color: var(--btn-text);
            font-family: 'Montserrat', sans-serif;
            min-width: 200px;
        }
        
        .option-btn:hover { background: var(--btn-hover); transform: scale(1.05); }
        .option-btn.disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .option-btn.disabled:hover { transform: none; }
        
        .result-message {
            font-size: 18px;
            margin: 20px 0;
            padding: 15px;
            border-radius: 15px;
        }
        
        .correct { background: #00aa44; color: white; }
        .wrong { background: #aa0044; color: white; }
        
        .next-btn {
            background: var(--btn-bg);
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            margin: 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s;
            color: var(--btn-text);
            font-family: 'Montserrat', sans-serif;
        }
        
        .next-btn:hover { background: var(--btn-hover); transform: scale(1.02); }
        
        .reset-btn {
            background: #888;
            border: none;
            padding: 12px 25px;
            font-size: 14px;
            margin: 10px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s;
            color: white;
            font-family: 'Montserrat', sans-serif;
        }
        
        .reset-btn:hover { background: #666; }
        
        .loading { font-size: 12px; color: var(--text-secondary); margin-top: 10px; }
        
        /* МОДАЛЬНЫЕ ОКНА */
        .search-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-game-box);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            padding: 30px;
            z-index: 2000;
            width: 90%;
            max-width: 500px;
        }
        .search-modal.show { display: block; }
        .search-input { width: 100%; padding: 12px; border-radius: 30px; border: 2px solid var(--border-color); background: var(--bg-body); color: var(--text-primary); font-family: 'Montserrat', sans-serif; font-size: 16px; margin-bottom: 20px; }
        .search-results { max-height: 300px; overflow-y: auto; }
        .search-result-item { padding: 10px; margin: 5px 0; background: var(--bg-card); border-radius: 15px; cursor: pointer; transition: 0.2s; }
        .search-result-item:hover { background: var(--bg-game-box); transform: scale(1.02); }
        .close-modal { background: var(--btn-bg); border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; margin-top: 15px; }
        
        .notification-panel {
            position: fixed;
            top: 70px;
            right: 20px;
            width: 300px;
            background: var(--bg-game-box);
            border: 2px solid var(--border-color);
            border-radius: 15px;
            z-index: 2000;
            display: none;
        }
        .notification-panel.show { display: block; }
        .notification-item {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }
        .notification-item:hover { background: var(--bg-card); }
        .notification-actions { display: flex; gap: 10px; margin-top: 8px; }
        .notif-accept, .notif-reject { padding: 5px 12px; border-radius: 20px; border: none; cursor: pointer; font-size: 12px; }
        .notif-accept { background: #00aa44; color: white; }
        .notif-reject { background: #aa0044; color: white; }
        
        .chat-modal {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 350px;
            height: 450px;
            background: var(--bg-game-box);
            border: 2px solid var(--border-color);
            border-radius: 15px;
            z-index: 2000;
            flex-direction: column;
        }
        .chat-modal.show { display: flex; }
        .chat-header {
            padding: 12px;
            background: var(--bg-card);
            border-radius: 13px 13px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-messages {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 15px;
        }
        .message.sent { background: var(--accent); color: #333; align-self: flex-end; }
        .message.received { background: var(--bg-card); align-self: flex-start; }
        .chat-input-area { display: flex; padding: 12px; gap: 8px; border-top: 1px solid var(--border-color); }
        .chat-input { flex: 1; padding: 8px; border-radius: 20px; border: 1px solid var(--border-color); background: var(--bg-body); color: var(--text-primary); }
        .chat-send { background: var(--btn-bg); border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; }
        
        .notification { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #00aa44; border-radius: 20px; padding: 15px 30px; z-index: 2000; text-align: center; animation: fadeInOut 2.5s ease-in-out; color: white; font-weight: bold; white-space: nowrap; }
        .notification.error { background: #aa0044; }
        @keyframes fadeInOut { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); } 15% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 85% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); } }
    </style>
</head>
<body>

    <div class="LoveChord-container">
        <div class="LoveChord-btn" onclick="window.location.href='index.html'">
            <span class="LoveChord-main">LoveChord</span>
            <span class="about-songs">все о песнях*</span>
        </div>
    </div>

    <!-- ИКОНКИ ПОИСКА И УВЕДОМЛЕНИЙ -->
    <div class="search-icon" onclick="openSearchModal()">🔍</div>
    <div class="notification-icon" id="notificationIcon" onclick="toggleNotifications()">
        🔔
        <span id="notificationBadge" class="notification-badge" style="display: none;">0</span>
    </div>

    <div class="daily-task-indicator" id="dailyTaskIndicator" onclick="window.location.href='profile-dashboard.html'">
        <span>📅</span>
        <span id="taskStatus">Задание дня</span>
    </div>

    <div class="profile-icon" id="profileIcon" onclick="window.location.href='profile-dashboard.html'">
        👤
    </div>

    <div class="nav-menu">
        <button class="nav-btn" onclick="window.location.href='game.html'">🎤 Угадай автора музыки</button>
        <button class="nav-btn" onclick="window.location.href='photo-game.html'">📸 Угадай автора по фото</button>
        <button class="nav-btn" onclick="window.location.href='popular-game.html'">📊 Какая песня популярней</button>
        <button class="nav-btn" onclick="window.location.href='favorite-game.html'">❤️ Выбери любимую песню</button>
        <button class="nav-btn" onclick="window.location.href='year-game.html'">📅 Угадай год</button>
        <button class="nav-btn" onclick="window.location.href='who-wrote-game.html'">✍️ Кто написал...</button>
        <button class="nav-btn active" onclick="window.location.href='emoji-game.html'">😊 Угадай по эмодзи</button>
        <button class="nav-btn" onclick="window.location.href='lyrics-game.html'">📝 Угадай по тексту</button>
    </div>

    <div class="records-container">
        <div class="record-card">
            <h3>🏆 Лучший личный счёт</h3>
            <div class="record-score" id="personalBestScore">0</div>
            <div class="record-date" id="personalBestDate">—</div>
            <div class="record-label" id="personalRecordLabel">английские</div>
        </div>
        <div class="record-card">
            <h3>🌍 Лучший счёт среди всех</h3>
            <div class="record-score" id="globalBestScore">0</div>
            <div class="record-date" id="globalBestDate">—</div>
            <div class="record-label" id="globalRecordLabel">английские</div>
        </div>
    </div>

    <div class="game-box" id="gameBox">
        <h1 id="mainTitle">😊 Угадай песню по эмодзи (Английские) 🎵</h1>
        <p>Какая песня скрывается за этими эмодзи?</p>

        <div class="score">
            🏆 Текущий счёт: <span id="scoreValue">0</span>
        </div>

        <div class="category-menu">
            <button class="category-btn" onclick="switchCategory('english')">🇬🇧 Английские</button>
            <button class="category-btn" onclick="switchCategory('russian')">🇷🇺 Русские</button>
            <button class="category-btn" onclick="switchCategory('kpop')">🇰🇷 К-поп</button>
        </div>

        <div class="emojis-container" id="emojisContainer">🎵 🎶 🎤</div>
        <div class="question-text" id="questionText">Что это за песня?</div>

        <div class="options-container" id="optionsContainer"></div>

        <div id="resultMessage" class="result-message"></div>
        
        <button class="next-btn" id="nextBtn" style="display: none;" onclick="nextQuestion()">➡ Следующий вопрос</button>
        <button class="reset-btn" onclick="resetGame()">🔄 Начать заново</button>
    </div>

    <!-- МОДАЛЬНЫЕ ОКНА -->
    <div id="searchModal" class="search-modal">
        <h3>🔍 Поиск игроков</h3>
        <input type="text" id="searchInput" class="search-input" placeholder="Введите никнейм..." onkeyup="searchUsers()">
        <div id="searchResults" class="search-results"></div>
        <button class="close-modal" onclick="closeSearchModal()">Закрыть</button>
    </div>

    <div id="notificationPanel" class="notification-panel">
        <h4 style="padding: 12px;">Уведомления</h4>
        <div id="notificationsList"></div>
    </div>

    <div id="chatModal" class="chat-modal">
        <div class="chat-header">
            <span id="chatFriendName">Чат</span>
            <button onclick="closeChat()" style="background:none; border:none; color:var(--text-primary); cursor:pointer;">✕</button>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" class="chat-input" placeholder="Сообщение...">
            <button class="chat-send" onclick="sendMessage()">📤</button>
        </div>
    </div>

    <button class="theme-toggle-bottom" onclick="toggleTheme()">🌓 Тема</button>

    <script>
        // ============================================================
        // АНГЛИЙСКИЕ ПЕСНИ (200+)
        // ============================================================
        const englishSongs = [
            { title: "...Baby One More Time", emojis: "👶 1️⃣ ⏰ 🔄", artist: "Britney Spears" },
            { title: "Toxic", emojis: "☣️ 💊", artist: "Britney Spears" },
            { title: "Circus", emojis: "🎪 🤡", artist: "Britney Spears" },
            { title: "Bad Romance", emojis: "👎 💕", artist: "Lady Gaga" },
            { title: "Poker Face", emojis: "🃏 😐", artist: "Lady Gaga" },
            { title: "Shake It Off", emojis: "💃 🙅", artist: "Taylor Swift" },
            { title: "Blank Space", emojis: "📝 ⬜", artist: "Taylor Swift" },

            if (!query) { resultsDiv.innerHTML = ''; return; }
            let users = JSON.parse(localStorage.getItem('lovechord_users') || '{}');
            let results = [];
            for (let name in users) {
                if (name.toLowerCase().includes(query) && name !== currentUserGlobal) results.push(name);

            let html = '';
            for (let res of results.slice(0, 10)) {

        function sendFriendRequestGlobal(toUser) {
            if (toUser === currentUserGlobal) { showNotificationGlobal('Нельзя добавить самого себя!', true); return; }
            let users = JSON.parse(localStorage.getItem('lovechord_users') || '{}');
            if (!users[toUser]) { showNotificationGlobal('Пользователь не найден!', true); return; }
            if (userDataGlobal.friends && userDataGlobal.friends.includes(toUser)) { showNotificationGlobal('Этот пользователь уже в друзьях!', true); return; }
            
            if (!users[toUser].friendRequests) users[toUser].friendRequests = [];
            if (users[toUser].friendRequests.includes(currentUserGlobal)) { showNotificationGlobal('Запрос уже отправлен!', true); return; }
            
            users[toUser].friendRequests.push(currentUserGlobal);
            localStorage.setItem('lovechord_users', JSON.stringify(users));
            showNotificationGlobal('Запрос в друзья отправлен!', false);
        }

        function acceptFriendRequestGlobal(fromUser) {
            let users = JSON.parse(localStorage.getItem('lovechord_users') || '{}');
            if (!userDataGlobal.friends) userDataGlobal.friends = [];
            if (!userDataGlobal.friends.includes(fromUser)) userDataGlobal.friends.push(fromUser);
            if (!users[fromUser].friends) users[fromUser].friends = [];
            if (!users[fromUser].friends.includes(currentUserGlobal)) users[fromUser].friends.push(currentUserGlobal);
            
            let index = userDataGlobal.friendRequests.indexOf(fromUser);
            if (index !== -1) userDataGlobal.friendRequests.splice(index, 1);
            
            if (!userDataGlobal.chats) userDataGlobal.chats = {};
            if (!userDataGlobal.chats[fromUser]) userDataGlobal.chats[fromUser] = [];
            
            localStorage.setItem('lovechord_users', JSON.stringify(users));
            saveGlobalUserData();
            showNotificationGlobal('Вы приняли запрос в друзья!', false);
            updateNotificationBadgeGlobal();
            if (document.getElementById('notificationsList')) toggleNotificationsGlobal();
        }

        function rejectFriendRequestGlobal(fromUser) {
            let users = JSON.parse(localStorage.getItem('lovechord_users') || '{}');
            let index = userDataGlobal.friendRequests.indexOf(fromUser);
            if (index !== -1) userDataGlobal.friendRequests.splice(index, 1);
            saveGlobalUserData();
            
            if (users[fromUser]) {
                if (!users[fromUser].notifications) users[fromUser].notifications = [];
                users[fromUser].notifications.push({ type: 'rejected', from: currentUserGlobal });
                localStorage.setItem('lovechord_users', JSON.stringify(users));
            }
            showNotificationGlobal('Запрос отклонен', false);
            updateNotificationBadgeGlobal();
        }

        function toggleNotificationsGlobal() {
            let panel = document.getElementById('notificationPanel');
            if (!panel) return;
            if (panel.classList.contains('show')) panel.classList.remove('show');
            else {
                let list = document.getElementById('notificationsList');
                if (list) {
                    list.innerHTML = '';
                    if (userDataGlobal.friendRequests && userDataGlobal.friendRequests.length > 0) {
                        for (let req of userDataGlobal.friendRequests) {
                            let div = document.createElement('div');
                            div.className = 'notification-item';
                            div.innerHTML = `<div><strong>${req}</strong> хочет добавить вас в друзья</div>
                                <div class="notification-actions">
                                    <button class="notif-accept" onclick="acceptFriendRequestGlobal('${req}')">Принять</button>
                                    <button class="notif-reject" onclick="rejectFriendRequestGlobal('${req}')">Отклонить</button>
                                </div>`;
                            list.appendChild(div);
                        }
                    }
                    if (userDataGlobal.notifications && userDataGlobal.notifications.length > 0) {
                        for (let notif of userDataGlobal.notifications) {
                            let div = document.createElement('div');
                            div.className = 'notification-item';
                            if (notif.type === 'rejected') {
                                div.innerHTML = `<div><strong>${notif.from}</strong> отклонил ваш запрос в друзья</div>`;
                            }
                            list.appendChild(div);
                        }
                    }
                    if (list.children.length === 0) {
                        list.innerHTML = '<div style="padding:12px;">Нет уведомлений</div>';
                    }
                }
                panel.classList.add('show');
            }
        }

        // ПРОВЕРКА ЕЖЕДНЕВНЫХ ЗАДАНИЙ
        function checkDailyTasks(user, today, newCorrectCount) {
            if (!user.dailyTasks) return false;
            
            let anyTaskCompleted = false;
            
            for (const task of user.dailyTasks) {
                if (user.dailyTasksCompleted.includes(task.id)) continue;
                
                let isCompleted = false;
                
                if (task.id === 'emoji_3' && newCorrectCount >= 3) isCompleted = true;
                else if (task.id === 'emoji_5' && newCorrectCount >= 5) isCompleted = true;
                else if (task.id === 'emoji_7' && newCorrectCount >= 7) isCompleted = true;
                else if (task.id === 'emoji_10' && newCorrectCount >= 10) isCompleted = true;
                else if (task.id === 'emoji_15' && newCorrectCount >= 15) isCompleted = true;
                
                if (isCompleted) {
                    user.dailyTasksCompleted.push(task.id);
                    user.tokens = (user.tokens || 100) + task.reward;
                    anyTaskCompleted = true;
                    showAchievementNotification(`✨ ЗАДАНИЕ ВЫПОЛНЕНО! ✨`, `${task.name}! +${task.reward} жетонов`, '📅');
                }
            }
            
            if (anyTaskCompleted) {
                user.dailyTasksCompletedCount = (user.dailyTasksCompletedCount || 0) + 1;
                checkPermanentTasks(user);
            }
            
            return anyTaskCompleted;
        }

        let correctAnswersCount = 0;

        function updateUserStats(isCorrect, isWin, gameName, category) {
            const currentUser = localStorage.getItem('lovechord_current_user');
            if (!currentUser) return;
            
            const users = JSON.parse(localStorage.getItem('lovechord_users') || '{}');
            const user = users[currentUser];
            if (!user) return;
            
            if (!user.stats) {
                user.stats = { totalGamesPlayed: 0, totalCorrectAnswers: 0, totalWrongAnswers: 0, wins: 0 };
            }
            if (!user.tokens) user.tokens = 100;
            if (!user.unlockedUsernameColors) user.unlockedUsernameColors = ['#ffffff', '#f5c4c4', '#e8a0a0'];
            if (!user.unlockedBannerColors) user.unlockedBannerColors = ['#1e1e2f', '#2a2a3a', '#f5c4c4', '#e8a0a0'];
            if (!user.unlockedBannerImages) user.unlockedBannerImages = ['Britney0.4'];
            
            user.stats.totalGamesPlayed++;
            if (isCorrect) {
                user.stats.totalCorrectAnswers++;
                correctAnswersCount++;
            } else {
                user.stats.totalWrongAnswers++;
            }
            
            if (isWin) {
                user.stats.wins = (user.stats.wins || 0) + 1;
                user.streak = (user.streak || 0) + 1;
                showAchievementNotification('🎉 ПОБЕДА! 🎉', `Вы завершили игру!`, '🏆');
            } else if (isCorrect) {
                user.streak = 0;
            } else {
                user.streak = 0;
            }
            
            const today = new Date().toDateString();
            if (!user.dailyProgress) user.dailyProgress = {};
            if (!user.dailyProgress[today]) user.dailyProgress[today] = {};
            
            if (gameName === 'emoji') {
                user.dailyProgress[today].emoji_correct = correctAnswersCount;
            }
            
            checkPermanentTasks(user);
            checkDailyTasks(user, today, correctAnswersCount);
            
            users[currentUser] = user;
            localStorage.setItem('lovechord_users', JSON.stringify(users));
            updateDailyTaskIndicator();
        }

        function updateDailyTaskIndicator() {
            const currentUser = localStorage.getItem('lovechord_current_user');
            if (!currentUser) {
                taskStatusSpan.textContent = 'Войти в профиль';
                return;
            }
            
            const users = JSON.parse(localStorage.getItem('lovechord_users') || '{}');
            const user = users[currentUser];
            if (!user) {
                taskStatusSpan.textContent = 'Войти в профиль';
                return;
            }
            
            const today = new Date().toDateString();
            const currentCorrect = user.dailyProgress?.[today]?.emoji_correct || 0;
            
            let activeTask = null;
            let activeTarget = null;
            
            if (user.dailyTasks) {
                const targets = [3, 5, 7, 10, 15];
                for (const target of targets) {
                    const taskId = `emoji_${target}`;
                    const taskExists = user.dailyTasks.some(t => t.id === taskId);
                    const taskCompleted = user.dailyTasksCompleted?.includes(taskId) || false;
                    
                    if (taskExists && !taskCompleted) {
                        activeTarget = target;
                        activeTask = taskId;
                        break;
                    }
                }
            }
            
            const indicator = document.getElementById('dailyTaskIndicator');
            
            if (!activeTask) {
                taskStatusSpan.innerHTML = '✅ Задания выполнены!';
                indicator.classList.add('completed');
            } else {
                taskStatusSpan.innerHTML = `📅 Угадай по эмодзи ${activeTarget} раз: ${currentCorrect}/${activeTarget}`;
                indicator.classList.remove('completed');
            }
        }

        function loadRecords() {
            const savedPersonal = localStorage.getItem('sonchiks_emoji_personal_best');
            if (savedPersonal) {
                const data = JSON.parse(savedPersonal);
                personalBest.english = data.english || 0;
                personalBest.russian = data.russian || 0;
                personalBest.kpop = data.kpop || 0;
                personalBest.dateEnglish = data.dateEnglish || null;
                personalBest.dateRussian = data.dateRussian || null;
                personalBest.dateKpop = data.dateKpop || null;
            }
            
            const savedGlobal = localStorage.getItem('sonchiks_emoji_global_best');
            if (savedGlobal) {
                const data = JSON.parse(savedGlobal);
                globalBest.english = data.english || 0;
                globalBest.russian = data.russian || 0;
                globalBest.kpop = data.kpop || 0;
                globalBest.dateEnglish = data.dateEnglish || null;
                globalBest.dateRussian = data.dateRussian || null;
                globalBest.dateKpop = data.dateKpop || null;
            }
            updateRecordsDisplay();
        }
        
        function saveRecords() {
            const personalData = {
                english: personalBest.english,
                russian: personalBest.russian,
                kpop: personalBest.kpop,
                dateEnglish: personalBest.dateEnglish,
                dateRussian: personalBest.dateRussian,
                dateKpop: personalBest.dateKpop
            };
            const globalData = {
                english: globalBest.english,
                russian: globalBest.russian,
                kpop: globalBest.kpop,
                dateEnglish: globalBest.dateEnglish,
                dateRussian: globalBest.dateRussian,
                dateKpop: globalBest.dateKpop
            };
            localStorage.setItem('sonchiks_emoji_personal_best', JSON.stringify(personalData));
            localStorage.setItem('sonchiks_emoji_global_best', JSON.stringify(globalData));
        }
        
        function formatTimeAgo(timestamp) {
            const now = Date.now();
            const diff = now - timestamp;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);
            
            if (days > 0) return `${days} ${days === 1 ? 'день' : days < 5 ? 'дня' : 'дней'} назад`;
            if (hours > 0) return `${hours} ${hours === 1 ? 'час' : hours < 5 ? 'часа' : 'часов'} назад`;
            if (minutes > 0) return `${minutes} ${minutes === 1 ? 'минуту' : minutes < 5 ? 'минуты' : 'минут'} назад`;
            return "только что";
        }
        
        function updateRecordsDisplay() {
            let personalScore = 0, globalScore = 0, personalDate = null, globalDate = null;
            let categoryLabel = "";
            
            if (currentCategory === 'english') {
                personalScore = personalBest.english;
                globalScore = globalBest.english;
                personalDate = personalBest.dateEnglish;
                globalDate = globalBest.dateEnglish;
                categoryLabel = "английские";
            } else if (currentCategory === 'russian') {
                personalScore = personalBest.russian;
                globalScore = globalBest.russian;
                personalDate = personalBest.dateRussian;
                globalDate = globalBest.dateRussian;
                categoryLabel = "русские";
            } else if (currentCategory === 'kpop') {
                personalScore = personalBest.kpop;
                globalScore = globalBest.kpop;
                personalDate = personalBest.dateKpop;
                globalDate = globalBest.dateKpop;
                categoryLabel = "к-поп";
            }
            
            personalBestScoreSpan.textContent = personalScore;
            globalBestScoreSpan.textContent = globalScore;
            personalRecordLabel.textContent = categoryLabel;
            globalRecordLabel.textContent = categoryLabel;
            
            if (personalDate) {
                personalBestDateSpan.textContent = formatTimeAgo(personalDate);
            } else {
                personalBestDateSpan.textContent = "—";
            }
            if (globalDate) {
                globalBestDateSpan.textContent = formatTimeAgo(globalDate);
            } else {
                globalBestDateSpan.textContent = "—";
            }
        }
        
        function checkAndUpdateRecords(scoreToCheck) {
            let updated = false;
            let recordMessage = "";
            
            if (currentCategory === 'english') {
                if (scoreToCheck > personalBest.english) {
                    personalBest.english = scoreToCheck;
                    personalBest.dateEnglish = Date.now();
                    updated = true;
                    recordMessage = "🎉 НОВЫЙ ЛИЧНЫЙ РЕКОРД! 🎉";
                    showAchievementNotification('ЛИЧНЫЙ РЕКОРД!', `Вы набрали ${scoreToCheck} очков в английских!`, '🏆');
                }
                if (scoreToCheck > globalBest.english) {
                    globalBest.english = scoreToCheck;
                    globalBest.dateEnglish = Date.now();
                    updated = true;
                    showAchievementNotification('МИРОВОЙ РЕКОРД!', `Непобедимый чемпион! ${scoreToCheck} очков в английских!`, '🌍');
                }
            } else if (currentCategory === 'russian') {
                if (scoreToCheck > personalBest.russian) {
                    personalBest.russian = scoreToCheck;
                    personalBest.dateRussian = Date.now();
                    updated = true;
                    recordMessage = "🎉 НОВЫЙ ЛИЧНЫЙ РЕКОРД! 🎉";
                    showAchievementNotification('ЛИЧНЫЙ РЕКОРД!', `Вы набрали ${scoreToCheck} очков в русских!`, '🏆');
                }
                if (scoreToCheck > globalBest.russian) {
                    globalBest.russian = scoreToCheck;
                    globalBest.dateRussian = Date.now();
                    updated = true;
                    showAchievementNotification('МИРОВОЙ РЕКОРД!', `Непобедимый чемпион! ${scoreToCheck} очков в русских!`, '🌍');
                }
            } else if (currentCategory === 'kpop') {
                if (scoreToCheck > personalBest.kpop) {
                    personalBest.kpop = scoreToCheck;
                    personalBest.dateKpop = Date.now();
                    updated = true;
                    recordMessage = "🎉 НОВЫЙ ЛИЧНЫЙ РЕКОРД! 🎉";
                    showAchievementNotification('ЛИЧНЫЙ РЕКОРД!', `Вы набрали ${scoreToCheck} очков в к-поп!`, '🏆');
                }
                if (scoreToCheck > globalBest.kpop) {
                    globalBest.kpop = scoreToCheck;
                    globalBest.dateKpop = Date.now();
                    updated = true;
                    showAchievementNotification('МИРОВОЙ РЕКОРД!', `Непобедимый чемпион! ${scoreToCheck} очков в к-поп!`, '🌍');
                }
            }
            
            if (updated) {
                saveRecords();
                updateRecordsDisplay();
                if (recordMessage && !recordMessage.includes('ЛИЧНЫЙ')) {
                    resultMessageDiv.innerHTML += `<br><br>${recordMessage}`;
                }
            }
        }
        
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function switchCategory(category) {
            currentCategory = category;
            correctAnswersCount = 0;
            if (category === 'english') {
                currentSongs = shuffleArray([...englishSongs]);
                mainTitle.innerHTML = '😊 Угадай песню по эмодзи (Английские) 🎵';
            } else if (category === 'russian') {
                currentSongs = shuffleArray([...russianSongs]);
                mainTitle.innerHTML = '😊 Угадай песню по эмодзи (Русские) 🎵';
            } else if (category === 'kpop') {
                currentSongs = shuffleArray([...kpopSongs]);
                mainTitle.innerHTML = '😊 Угадай песню по эмодзи (К-поп) 🎵';
            }
            currentIndex = 0;
            currentScore = 0;
            scoreSpan.textContent = currentScore;
            gameActive = true;
            canAnswer = true;
            gameCompleted = false;
            updateRecordsDisplay();
            loadQuestion();
        }

        function generateOptions(correctSong, songsArray) {
            const otherSongs = songsArray.filter(s => s.title !== correctSong.title);
            const shuffledOthers = shuffleArray([...otherSongs]);
            const options = [correctSong.title, shuffledOthers[0].title, shuffledOthers[1].title];
            return shuffleArray(options);
        }

        function loadQuestion() {
            if (!gameActive) return;
            if (currentIndex >= currentSongs.length) {
                updateUserStats(true, true, 'emoji', currentCategory);
                checkAndUpdateRecords(currentScore);
                resultMessageDiv.innerHTML = `🎉 ИГРА ОКОНЧЕНА! 🎉<br><br>Твой счёт: ${currentScore} из ${currentSongs.length}<br><br>🔄 Нажми "Начать заново", чтобы сыграть снова!`;
                resultMessageDiv.className = "result-message correct";
                optionsContainer.innerHTML = "";
                nextBtn.style.display = "none";
                emojisContainer.innerHTML = "🏆 🎉 🏆";
                gameActive = false;
                gameCompleted = true;
                return;
            }
            
            canAnswer = true;
            resultMessageDiv.innerHTML = "";
            resultMessageDiv.className = "result-message";
            nextBtn.style.display = "none";
            optionsContainer.innerHTML = "";
            
            currentQuestion = currentSongs[currentIndex];
            emojisContainer.innerHTML = currentQuestion.emojis;
            
            const options = generateOptions(currentQuestion, currentSongs);
            options.forEach(option => {
                const btn = document.createElement('button');
                btn.textContent = option;
                btn.className = 'option-btn';
                btn.onclick = () => checkAnswer(option);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedTitle) {
            if (!canAnswer || !gameActive) return;
            canAnswer = false;
            const isCorrect = (selectedTitle === currentQuestion.title);
            const allButtons = document.querySelectorAll('.option-btn');
            allButtons.forEach(btn => btn.classList.add('disabled'));
            
            if (isCorrect) {
                currentScore++;
                scoreSpan.textContent = currentScore;
                correctAnswersCount++;
                updateUserStats(true, false, 'emoji', currentCategory);
                resultMessageDiv.innerHTML = `✅ ПРАВИЛЬНО! +1 очко! (${currentQuestion.artist}) ✅`;
                resultMessageDiv.className = "result-message correct";
                nextBtn.style.display = "block";
                currentIndex++;
            } else {
                updateUserStats(false, false, 'emoji', currentCategory);
                checkAndUpdateRecords(currentScore);
                resultMessageDiv.innerHTML = `❌ НЕПРАВИЛЬНО! Правильный ответ: "${currentQuestion.title}" - ${currentQuestion.artist} ❌<br><br>Игра начинается заново!`;
                resultMessageDiv.className = "result-message wrong";
                currentScore = 0;
                correctAnswersCount = 0;
                scoreSpan.textContent = currentScore;
                gameActive = false;
                setTimeout(() => {
                    resetGameState();
                    gameActive = true;
                    loadQuestion();
                }, 2000);
                return;
            }
        }

        function nextQuestion() {
            loadQuestion();
        }

        function resetGameState() {
            if (currentCategory === 'english') currentSongs = shuffleArray([...englishSongs]);
            else if (currentCategory === 'russian') currentSongs = shuffleArray([...russianSongs]);
            else if (currentCategory === 'kpop') currentSongs = shuffleArray([...kpopSongs]);
            currentIndex = 0;
            currentScore = 0;
            correctAnswersCount = 0;
            scoreSpan.textContent = currentScore;
            canAnswer = true;
            gameActive = true;
            gameCompleted = false;
        }

        function resetGame() {
            if (!gameCompleted && currentScore > 0) {
                checkAndUpdateRecords(currentScore);
            }
            resetGameState();
            gameActive = true;
            loadQuestion();
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem('sonchiks_theme');
            if (savedTheme === 'light') document.body.classList.add('light-theme');
            else document.body.classList.remove('light-theme');
        }

        function toggleTheme() {
            if (document.body.classList.contains('light-theme')) {
                document.body.classList.remove('light-theme');
                localStorage.setItem('sonchiks_theme', 'dark');
            } else {
                document.body.classList.add('light-theme');
                localStorage.setItem('sonchiks_theme', 'light');
            }
        }

        function loadProfileIcon() {
            const currentUser = localStorage.getItem('lovechord_current_user');
            const users = JSON.parse(localStorage.getItem('lovechord_users') || '{}');
            if (currentUser && users[currentUser]) {
                const icon = document.getElementById('profileIcon');
                if (users[currentUser].avatar) icon.innerHTML = `<img src="${users[currentUser].avatar}" alt="avatar">`;
                else { icon.innerHTML = users[currentUser].username.charAt(0).toUpperCase(); icon.style.fontSize = '24px'; icon.style.fontWeight = 'bold'; }
            }
        }

        // Экспорт функций в глобальную область
        window.openSearchModal = openSearchModal;
        window.closeSearchModal = closeSearchModal;
        window.searchUsers = searchUsers;
        window.viewProfileGlobal = viewProfileGlobal;
        window.toggleNotifications = toggleNotificationsGlobal;
        window.closeChat = closeChatGlobal;
        window.sendMessage = sendMessageGlobal;
        window.toggleTheme = toggleTheme;
        
        loadProfileIcon();
        loadTheme();
        loadRecords();
        loadGlobalUserData();
        updateDailyTaskIndicator();
        currentSongs = shuffleArray([...englishSongs]);
        resetGameState();
        loadQuestion();
        
        // Обновление чата каждую секунду
        setInterval(() => { if (currentChatWithGlobal) loadChatMessagesGlobal(); }, 1000);
    </script>
