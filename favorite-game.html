<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <title>Выбери любимую песню - Турнир - LoveChord</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap');
        
        :root {
            --bg-body: #1e1e2f;
            --bg-game-box: #2a2a3a;
            --bg-card: #1e1e2f;
            --text-primary: white;
            --text-secondary: #aaa;
            --btn-bg: #f5c4c4;
            --btn-hover: #e8a0a0;
            --btn-text: #333;
            --border-color: #f5c4c4;
            --accent: #ffcc00;
            --success: #00aa44;
            --success-glow: #00ff55;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            background: var(--bg-body);
            color: var(--text-primary);
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }
        
        body.light-theme {
            --bg-body: #ffe4e1;
            --bg-game-box: #ffd6d6;
            --bg-card: #ffebeb;
            --text-primary: #333;
            --text-secondary: #666;
            --btn-bg: #2a2a3a;
            --btn-hover: #3a3a4a;
            --btn-text: #f5c4c4;
            --border-color: #2a2a3a;
            --accent: #ff6b6b;
        }
        
        @keyframes achievementUnlock {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            50% { transform: scale(1.2) rotate(0deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        
        @keyframes confettiFall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
        
        @keyframes glowPulse {
            0% { box-shadow: 0 0 0 0 var(--success-glow); }
            50% { box-shadow: 0 0 20px 10px var(--success-glow); }
            100% { box-shadow: 0 0 0 0 var(--success-glow); }
        }
        
        .achievement-notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #333;
            padding: 20px 40px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 24px;
            z-index: 10000;
            animation: achievementUnlock 0.5s ease-out;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            min-width: 300px;
        }
        
        .achievement-notification .achievement-icon { font-size: 48px; display: block; margin-bottom: 10px; }
        .achievement-notification .achievement-title { font-size: 20px; margin-bottom: 5px; }
        .achievement-notification .achievement-desc { font-size: 14px; opacity: 0.9; }
        
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            position: absolute;
            z-index: 9999;
            pointer-events: none;
            animation: confettiFall 3s ease-in forwards;
        }
        
        .game-box.completed { animation: glowPulse 0.5s ease-out; }
        
        .LoveChord-container {
            position: fixed;
            top: 20px;
            left: 20px;
            text-align: center;
            z-index: 1000;
        }
        
        .LoveChord-btn {
            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            display: block;
            text-align: center;
            text-decoration: none;
        }
        
        .LoveChord-btn:hover { background: var(--btn-hover); transform: scale(1.02); }
        .LoveChord-main { display: block; font-size: 20px; font-weight: 800; font-family: 'Montserrat', sans-serif; letter-spacing: 2px; font-variant: small-caps; }
        .about-songs { display: block; font-size: 9px; text-decoration: none; margin-top: 3px; font-weight: normal; font-family: 'Montserrat', sans-serif; }

        /* ИКОНКИ ПОИСКА И УВЕДОМЛЕНИЙ */
        .search-icon {
            position: fixed;
            top: 20px;
            right: 140px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--btn-bg);
            color: var(--btn-text);
            border: 2px solid var(--border-color);
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            z-index: 1000;
        }
        .search-icon:hover { transform: scale(1.05); background: var(--btn-hover); }
        
        .notification-icon {
            position: fixed;
            top: 20px;
            right: 200px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--btn-bg);
            color: var(--btn-text);
            border: 2px solid var(--border-color);
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            z-index: 1000;
        }
        .notification-icon:hover { transform: scale(1.05); background: var(--btn-hover); }
        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4444;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .profile-icon {
            position: fixed;
            top: 20px;
            right: 80px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--btn-bg);
            color: var(--btn-text);
            border: 2px solid var(--border-color);
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            z-index: 1000;
            overflow: hidden;
        }
        
        .profile-icon:hover { transform: scale(1.05); background: var(--btn-hover); }
        .profile-icon img { width: 100%; height: 100%; object-fit: cover; }
        
        .daily-task-indicator {
            position: fixed;
            top: 20px;
            right: 260px;
            background: var(--btn-bg);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--btn-text);
        }
        
        .daily-task-indicator.completed { background: var(--success); color: white; animation: glowPulse 0.5s ease-out; }
        
        .theme-toggle-bottom {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            padding: 10px 15px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 16px;
            font-weight: 600;
            z-index: 1000;
            font-family: 'Montserrat', sans-serif;
        }
        
        .theme-toggle-bottom:hover { background: var(--btn-hover); transform: scale(1.02); }
        
        .nav-menu {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            margin-top: 60px;
            z-index: 1000;
            position: relative;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            padding-bottom: 10px;
            cursor: grab;
        }
        
        .nav-menu:active { cursor: grabbing; }
        .nav-menu::-webkit-scrollbar { height: 5px; }
        .nav-menu::-webkit-scrollbar-track { background: var(--bg-game-box); border-radius: 10px; }
        .nav-menu::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        .nav-menu::-webkit-scrollbar-thumb:hover { background: var(--btn-hover); }
        
        .nav-btn {
            background: var(--bg-game-box);
            border: 2px solid var(--border-color);
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--border-color);
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .nav-btn:hover:not(.active) { background: var(--btn-bg); color: var(--btn-text); }
        .nav-btn.active { background: var(--btn-bg); color: var(--btn-text); cursor: default; opacity: 0.7; }
        
        .category-menu {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        
        .category-btn {
            background: var(--bg-game-box);
            border: 2px solid var(--border-color);
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--border-color);
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
        }
        
        .category-btn:hover { background: var(--btn-bg); color: var(--btn-text); }
        
        .game-box {
            background: var(--bg-game-box);
            max-width: 1000px;
            margin: 20px auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: all 0.3s;
        }
        
        h1 {
            color: var(--border-color);
            font-family: 'Montserrat', sans-serif;
            font-variant: small-caps;
            font-weight: 800;
            letter-spacing: 2px;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .round-info {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
            color: var(--accent);
            background: var(--bg-body);
            display: inline-block;
            padding: 10px 30px;
            border-radius: 50px;
        }
        
        .vs-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin: 30px 0;
        }
        
        .song-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px;
            width: 380px;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid var(--border-color);
        }
        
        .song-card:hover {
            transform: scale(1.02);
            background: var(--bg-game-box);
            border-color: var(--accent);
        }
        
        .song-card.selected {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent);
        }
        
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 15px;
            background: #000;
        }
        
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .song-title {
            font-size: 18px;
            font-weight: bold;
            margin: 15px 0 5px;
            color: var(--border-color);
        }
        
        .song-artist {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .vs-divider {
            font-size: 40px;
            font-weight: bold;
            color: var(--accent);
            display: flex;
            align-items: center;
        }
        
        .result-message {
            font-size: 20px;
            margin: 20px 0;
            padding: 15px;
            border-radius: 15px;
        }
        
        .correct {
            color: #00ffaa;
            background: #00000088;
        }
        
        .win {
            background: #00aa44;
            color: white;
        }
        
        .winner-card {
            background: linear-gradient(135deg, var(--bg-game-box), var(--bg-card));
            border: 3px solid var(--accent);
            box-shadow: 0 0 20px var(--accent);
        }
        
        .next-btn {
            background: var(--btn-bg);
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            margin: 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s;
            color: var(--btn-text);
            font-family: 'Montserrat', sans-serif;
        }
        
        .next-btn:hover {
            background: var(--btn-hover);
            transform: scale(1.02);
        }
        
        .reset-btn {
            background: #888;
            border: none;
            padding: 12px 25px;
            font-size: 14px;
            margin: 10px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s;
            color: white;
            font-family: 'Montserrat', sans-serif;
        }
        
        .reset-btn:hover {
            background: #666;
        }
        
        .progress {
            margin: 20px 0;
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        /* МОДАЛЬНЫЕ ОКНА */
        .search-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-game-box);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            padding: 30px;
            z-index: 2000;
            width: 90%;
            max-width: 500px;
        }
        .search-modal.show { display: block; }
        .search-input { width: 100%; padding: 12px; border-radius: 30px; border: 2px solid var(--border-color); background: var(--bg-body); color: var(--text-primary); font-family: 'Montserrat', sans-serif; font-size: 16px; margin-bottom: 20px; }
        .search-results { max-height: 300px; overflow-y: auto; }
        .search-result-item { padding: 10px; margin: 5px 0; background: var(--bg-card); border-radius: 15px; cursor: pointer; transition: 0.2s; }
        .search-result-item:hover { background: var(--bg-game-box); transform: scale(1.02); }
        .close-modal { background: var(--btn-bg); border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; margin-top: 15px; }
        
        .notification-panel {
            position: fixed;
            top: 70px;
            right: 20px;
            width: 300px;
            background: var(--bg-game-box);
            border: 2px solid var(--border-color);
            border-radius: 15px;
            z-index: 2000;
            display: none;
        }
        .notification-panel.show { display: block; }
        .notification-item {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }
        .notification-item:hover { background: var(--bg-card); }
        .notification-actions { display: flex; gap: 10px; margin-top: 8px; }
        .notif-accept, .notif-reject { padding: 5px 12px; border-radius: 20px; border: none; cursor: pointer; font-size: 12px; }
        .notif-accept { background: #00aa44; color: white; }
        .notif-reject { background: #aa0044; color: white; }
        
        .chat-modal {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 350px;
            height: 450px;
            background: var(--bg-game-box);
            border: 2px solid var(--border-color);
            border-radius: 15px;
            z-index: 2000;
            flex-direction: column;
        }
        .chat-modal.show { display: flex; }
        .chat-header {
            padding: 12px;
            background: var(--bg-card);
            border-radius: 13px 13px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-messages {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 15px;
        }
        .message.sent { background: var(--accent); color: #333; align-self: flex-end; }
        .message.received { background: var(--bg-card); align-self: flex-start; }
        .chat-input-area { display: flex; padding: 12px; gap: 8px; border-top: 1px solid var(--border-color); }
        .chat-input { flex: 1; padding: 8px; border-radius: 20px; border: 1px solid var(--border-color); background: var(--bg-body); color: var(--text-primary); }
        .chat-send { background: var(--btn-bg); border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; }
        
        .notification { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #00aa44; border-radius: 20px; padding: 15px 30px; z-index: 2000; text-align: center; animation: fadeInOut 2.5s ease-in-out; color: white; font-weight: bold; white-space: nowrap; }
        .notification.error { background: #aa0044; }
        @keyframes fadeInOut { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); } 15% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 85% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); } }
    </style>
</head>
<body>

    <div class="LoveChord-container">
        <div class="LoveChord-btn" onclick="window.location.href='index.html'">
            <span class="LoveChord-main">LoveChord</span>
            <span class="about-songs">все о песнях*</span>
        </div>
    </div>

    <!-- ИКОНКИ ПОИСКА И УВЕДОМЛЕНИЙ -->
    <div class="search-icon" onclick="openSearchModal()">🔍</div>
    <div class="notification-icon" id="notificationIcon" onclick="toggleNotifications()">
        🔔
        <span id="notificationBadge" class="notification-badge" style="display: none;">0</span>
    </div>

    <div class="daily-task-indicator" id="dailyTaskIndicator" onclick="window.location.href='profile-dashboard.html'">
        <span>📅</span>
        <span id="taskStatus">Задание дня</span>
    </div>

    <div class="profile-icon" id="profileIcon" onclick="window.location.href='profile-dashboard.html'">
        👤
    </div>

    <div class="nav-menu">
        <button class="nav-btn" onclick="window.location.href='game.html'">🎤 Угадай автора музыки</button>
        <button class="nav-btn" onclick="window.location.href='photo-game.html'">📸 Угадай автора по фото</button>
        <button class="nav-btn" onclick="window.location.href='popular-game.html'">📊 Какая песня популярней</button>
        <button class="nav-btn active" onclick="window.location.href='favorite-game.html'">❤️ Выбери любимую песню</button>
        <button class="nav-btn" onclick="window.location.href='year-game.html'">📅 Угадай год</button>
        <button class="nav-btn" onclick="window.location.href='who-wrote-game.html'">✍️ Кто написал...</button>
        <button class="nav-btn" onclick="window.location.href='emoji-game.html'">😊 Угадай по эмодзи</button>
        <button class="nav-btn" onclick="window.location.href='lyrics-game.html'">📝 Угадай по тексту</button>
    </div>

    <div class="game-box" id="gameBox">
        <h1 id="mainTitle">❤️ ВЫБЕРИ ЛЮБИМУЮ АНГЛИЙСКУЮ ПЕСНЮ 🎵</h1>
        <p>Кликай на песню, которая тебе нравится больше!</p>

        <div class="category-menu">
            <button class="category-btn" onclick="switchCategory('english')">🇬🇧 Английские</button>
            <button class="category-btn" onclick="switchCategory('russian')">🇷🇺 Русские (70-2019)</button>
            <button class="category-btn" onclick="switchCategory('modern')">🎤 Современные русские (2019-2026)</button>
            <button class="category-btn" onclick="switchCategory('kpop')">🇰🇷 К-поп</button>
        </div>

        <div class="round-info" id="roundInfo">Раунд 1: 32 песни → 16</div>

    <div id="searchModal" class="search-modal">
        <h3>🔍 Поиск игроков</h3>
        <input type="text" id="searchInput" class="search-input" placeholder="Введите никнейм..." onkeyup="searchUsers()">
        <div id="searchResults" class="search-results"></div>
        <button class="close-modal" onclick="closeSearchModal()">Закрыть</button>
    </div>

    <div id="notificationPanel" class="notification-panel">
        <h4 style="padding: 12px;">Уведомления</h4>
        <div id="notificationsList"></div>
    </div>

    <div id="chatModal" class="chat-modal">
        <div class="chat-header">
            <span id="chatFriendName">Чат</span>
            <button onclick="closeChat()" style="background:none; border:none; color:var(--text-primary); cursor:pointer;">✕</button>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" class="chat-input" placeholder="Сообщение...">
            <button class="chat-send" onclick="sendMessage()">📤</button>
        </div>
    </div>

    <button class="theme-toggle-bottom" onclick="toggleTheme()">🌓 Тема</button>

    <script>
        // ============================================================
        // 1. АНГЛИЙСКИЕ ПЕСНИ
        // ============================================================
        const englishSongs = [
            { title: "Blinding Lights", artist: "The Weeknd", embedCode: `<iframe src="https://vkvideo.ru/video_ext.php?oid=-227374044&id=456239093&hd=4" width="1920" height="1080" allow="autoplay; encrypted-media; fullscreen; picture-in-picture; screen-wake-lock;" frameborder="0" allowfullscreen></iframe>` },
            { title: "Animals", artist: "Maroon 5", embedCode: `<iframe src="https://vkvideo.ru/video_ext.php?oid=-49654036&id=170147684&hd=3&t=27s" width="1280" height="720" allow="autoplay; encrypted-media; fullscreen; picture-in-picture; screen-wake-lock;" frameborder="0" allowfullscreen></iframe>` },
            { title: "GIRL LIKE ME", artist: "Black Eyed Peas, Shakira", embedCode: `<iframe src="https://vkvideo.ru/video_ext.php?oid=-223832598&id=456239072&hd=4" width="1920" height="1080" allow="autoplay; encrypted-media; fullscreen; picture-in-picture; screen-wake-lock;" frameborder="0" allowfullscreen></iframe>` },

        // ===== ФУНКЦИИ ДЛЯ ПОИСКА, ДРУЗЕЙ И ЧАТА =====
        function showNotificationGlobal(msg, isError) {
            let n = document.createElement('div');
            n.className = 'notification' + (isError ? ' error' : '');
            n.textContent = msg;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 2500);
        }

        function loadGlobalUserData() {
            currentUserGlobal = localStorage.getItem('lovechord_current_user');
            let users = JSON.parse(localStorage.getItem('lovechord_users') || '{}');
            if (currentUserGlobal && users[currentUserGlobal]) {
                userDataGlobal = users[currentUserGlobal];
                if (!userDataGlobal.friends) userDataGlobal.friends = [];
                if (!userDataGlobal.friendRequests) userDataGlobal.friendRequests = [];
                if (!userDataGlobal.notifications) userDataGlobal.notifications = [];
                if (!userDataGlobal.chats) userDataGlobal.chats = {};
                updateNotificationBadgeGlobal();
            }
        }

        function saveGlobalUserData() {
            let users = JSON.parse(localStorage.getItem('lovechord_users') || '{}');
            users[currentUserGlobal] = userDataGlobal;
            localStorage.setItem('lovechord_users', JSON.stringify(users));
        }

        function updateNotificationBadgeGlobal() {
            let count = (userDataGlobal.friendRequests ? userDataGlobal.friendRequests.length : 0) + (userDataGlobal.notifications ? userDataGlobal.notifications.length : 0);
            let badge = document.getElementById('notificationBadge');
            if (badge) {
                if (count > 0) { badge.textContent = count; badge.style.display = 'flex'; }
                else badge.style.display = 'none';
            }
        }

        function openSearchModal() {
            let modal = document.getElementById('searchModal');
            if (modal) modal.classList.add('show');
            let input = document.getElementById('searchInput');
            if (input) { input.value = ''; }
            let results = document.getElementById('searchResults');
            if (results) results.innerHTML = '';
        }

        function closeSearchModal() {
            let modal = document.getElementById('searchModal');
            if (modal) modal.classList.remove('show');
        }

        function searchUsers() {
            let query = document.getElementById('searchInput').value.toLowerCase().trim();
            let resultsDiv = document.getElementById('searchResults');
            if (!query) { resultsDiv.innerHTML = ''; return; }
            let users = JSON.parse(localStorage.getItem('lovechord_users') || '{}');
            let results = [];
            for (let name in users) {
                if (name.toLowerCase().includes(query) && name !== currentUserGlobal) results.push(name);
            }
            let html = '';
            for (let res of results.slice(0, 10)) {
                html += `<div class="search-result-item" onclick="viewProfileGlobal('${res}')">🔍 ${res}</div>`;
            }
            if (html === '') html = '<div>Ничего не найдено</div>';
            resultsDiv.innerHTML = html;
        }

        function viewProfileGlobal(username) {
            closeSearchModal();
            window.location.href = 'profile-dashboard.html?view=' + encodeURIComponent(username);
        }

        function sendFriendRequestGlobal(toUser) {
            if (toUser === currentUserGlobal) { showNotificationGlobal('Нельзя добавить самого себя!', true); return; }
            let users = JSON.parse(localStorage.getItem('lovechord_users') || '{}');
            if (!users[toUser]) { showNotificationGlobal('Пользователь не найден!', true); return; }
            if (userDataGlobal.friends && userDataGlobal.friends.includes(toUser)) { showNotificationGlobal('Этот пользователь уже в друзьях!', true); return; }
            
            if (!users[toUser].friendRequests) users[toUser].friendRequests = [];
            if (users[toUser].friendRequests.includes(currentUserGlobal)) { showNotificationGlobal('Запрос уже отправлен!', true); return; }
            
            users[toUser].friendRequests.push(currentUserGlobal);
            localStorage.setItem('lovechord_users', JSON.stringify(users));
            showNotificationGlobal('Запрос в друзья отправлен!', false);
        }

        function acceptFriendRequestGlobal(fromUser) {
            let users = JSON.parse(localStorage.getItem('lovechord_users') || '{}');
            if (!userDataGlobal.friends) userDataGlobal.friends = [];
            if (!userDataGlobal.friends.includes(fromUser)) userDataGlobal.friends.push(fromUser);
            if (!users[fromUser].friends) users[fromUser].friends = [];
            if (!users[fromUser].friends.includes(currentUserGlobal)) users[fromUser].friends.push(currentUserGlobal);
            
            let index = userDataGlobal.friendRequests.indexOf(fromUser);
            if (index !== -1) userDataGlobal.friendRequests.splice(index, 1);
            
            if (!userDataGlobal.chats) userDataGlobal.chats = {};
            if (!userDataGlobal.chats[fromUser]) userDataGlobal.chats[fromUser] = [];
            
            localStorage.setItem('lovechord_users', JSON.stringify(users));
            saveGlobalUserData();
            showNotificationGlobal('Вы приняли запрос в друзья!', false);
            updateNotificationBadgeGlobal();
            if (document.getElementById('notificationsList')) toggleNotificationsGlobal();
        }

        function rejectFriendRequestGlobal(fromUser) {
            let users = JSON.parse(localStorage.getItem('lovechord_users') || '{}');
            let index = userDataGlobal.friendRequests.indexOf(fromUser);
            if (index !== -1) userDataGlobal.friendRequests.splice(index, 1);
            saveGlobalUserData();
            
            if (users[fromUser]) {
                if (!users[fromUser].notifications) users[fromUser].notifications = [];
                users[fromUser].notifications.push({ type: 'rejected', from: currentUserGlobal });
                localStorage.setItem('lovechord_users', JSON.stringify(users));
            }
            showNotificationGlobal('Запрос отклонен', false);
            updateNotificationBadgeGlobal();
        }

        function toggleNotificationsGlobal() {
            let panel = document.getElementById('notificationPanel');
            if (!panel) return;
            if (panel.classList.contains('show')) panel.classList.remove('show');
            else {
                let list = document.getElementById('notificationsList');
                if (list) {
                    list.innerHTML = '';
                    if (userDataGlobal.friendRequests && userDataGlobal.friendRequests.length > 0) {
                        for (let req of userDataGlobal.friendRequests) {
                            let div = document.createElement('div');
                            div.className = 'notification-item';
                            div.innerHTML = `<div><strong>${req}</strong> хочет добавить вас в друзья</div>
                                <div class="notification-actions">
                                    <button class="notif-accept" onclick="acceptFriendRequestGlobal('${req}')">Принять</button>
                                    <button class="notif-reject" onclick="rejectFriendRequestGlobal('${req}')">Отклонить</button>
                                </div>`;
                            list.appendChild(div);
                        }
                    }
                    if (userDataGlobal.notifications && userDataGlobal.notifications.length > 0) {
                        for (let notif of userDataGlobal.notifications) {
                            let div = document.createElement('div');
                            div.className = 'notification-item';
                            if (notif.type === 'rejected') {
                                div.innerHTML = `<div><strong>${notif.from}</strong> отклонил ваш запрос в друзья</div>`;
                            }
                            list.appendChild(div);
                        }
                    }
                    if (list.children.length === 0) {
                        list.innerHTML = '<div style="padding:12px;">Нет уведомлений</div>';
                    }
                }
                panel.classList.add('show');
            }
        }

        function openChatWithGlobal(friendName) {
            currentChatWithGlobal = friendName;

        function sendMessageGlobal() {
            let input = document.getElementById('chatInput');
            let text = input.value.trim();
            if (!text || !currentChatWithGlobal) return;
            
            if (!userDataGlobal.chats) userDataGlobal.chats = {};
            if (!userDataGlobal.chats[currentChatWithGlobal]) userDataGlobal.chats[currentChatWithGlobal] = [];
            userDataGlobal.chats[currentChatWithGlobal].push({ from: currentUserGlobal, text: text, time: Date.now() });
            saveGlobalUserData();
            
            let users = JSON.parse(localStorage.getItem('lovechord_users') || '{}');
            if (users[currentChatWithGlobal]) {
                if (!users[currentChatWithGlobal].chats) users[currentChatWithGlobal].chats = {};
                if (!users[currentChatWithGlobal].chats[currentUserGlobal]) users[currentChatWithGlobal].chats[currentUserGlobal] = [];
                users[currentChatWithGlobal].chats[currentUserGlobal].push({ from: currentUserGlobal, text: text, time: Date.now() });
                localStorage.setItem('lovechord_users', JSON.stringify(users));
            }
            
            input.value = '';
            loadChatMessagesGlobal();
        }

        function loadChatMessagesGlobal() {
            let container = document.getElementById('chatMessages');
            if (!container || !currentChatWithGlobal) return;
            let messages = (userDataGlobal.chats && userDataGlobal.chats[currentChatWithGlobal]) ? userDataGlobal.chats[currentChatWithGlobal] : [];
            container.innerHTML = '';
            for (let msg of messages) {
                let div = document.createElement('div');
                div.className = 'message ' + (msg.from === currentUserGlobal ? 'sent' : 'received');
                div.textContent = msg.text;
                container.appendChild(div);
            }
            container.scrollTop = container.scrollHeight;
        }

        function createConfetti() {
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffaa00', '#ff6600'];
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * window.innerWidth + 'px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.width = Math.random() * 10 + 5 + 'px';
                confetti.style.height = Math.random() * 10 + 5 + 'px';
                confetti.style.animationDuration = Math.random() * 2 + 2 + 's';
                confetti.style.animationDelay = Math.random() * 0.5 + 's';
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 3000);
            }
        }

        function showAchievementNotification(title, desc, icon = '🏆') {
            const notification = document.createElement('div');
            notification.className = 'achievement-notification';
            notification.innerHTML = `<div class="achievement-icon">${icon}</div><div class="achievement-title">${title}</div><div class="achievement-desc">${desc}</div>`;
            document.body.appendChild(notification);
            gameBox.classList.add('completed');
            setTimeout(() => gameBox.classList.remove('completed'), 500);
            createConfetti();
            setTimeout(() => {
                notification.style.animation = 'achievementUnlock 0.3s reverse';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // ПРОВЕРКА ПОСТОЯННЫХ ЗАДАНИЙ
        function checkPermanentTasks(user) {
            const permanentTasks = [
                { id: 'first_favorite', name: 'Поиграть впервые в "❤️ Выбери любимую песню"', reward: '30', rewardType: 'tokens' },
                { id: 'totalGames30', name: 'Сыграть в общем 30 игр', reward: 'color_pink', rewardType: 'colors', rewardData: ['#ffb7c5', '#ffc0cb', '#ffd1dc', '#ffe4e1'] },
                { id: 'totalGames50', name: 'Сыграть в общем 50 игр', reward: 'banner_Britney0.1', rewardType: 'banner', rewardData: 'Britney0.1' },
                { id: 'totalGames100', name: 'Сыграть в общем 100 игр', reward: '50', rewardType: 'tokens' },
                { id: 'totalGames150', name: 'Сыграть в общем 150 игр', reward: '60', rewardType: 'tokens' },
                { id: 'wins30', name: 'Набрать в общем 30 побед', reward: '30', rewardType: 'tokens' },
                { id: 'wins50', name: 'Набрать в общем 50 побед', reward: 'color_green', rewardType: 'colors', rewardData: ['#90ee90', '#98fb98', '#7cfc00', '#32cd32'] },
                { id: 'wins100', name: 'Набрать в общем 100 побед', reward: '30', rewardType: 'tokens' },
                { id: 'wins150', name: 'Набрать в общем 150 побед', reward: '50', rewardType: 'tokens' },
                { id: 'streak5', name: 'Набрать серию побед 5', reward: 'color_blue', rewardType: 'colors', rewardData: ['#87ceeb', '#87cefa', '#00bfff', '#1e90ff'] },
                { id: 'streak10', name: 'Набрать серию побед 10', reward: 'banner_Marshmello0.2', rewardType: 'banner', rewardData: 'Marshmello0.2' },
                { id: 'streak15', name: 'Набрать серию побед 15', reward: '50', rewardType: 'tokens' },
                { id: 'streak20', name: 'Набрать серию побед 20', reward: '150', rewardType: 'tokens' },
                { id: 'dailyTasks10', name: 'Выполнить 10 ежедневных заданий', reward: 'banner_Christina0.2', rewardType: 'banner', rewardData: 'Christina0.2' },
                { id: 'dailyTasks15', name: 'Выполнить 15 ежедневных заданий', reward: '70', rewardType: 'tokens' },
                { id: 'dailyTasks20', name: 'Выполнить 20 ежедневных заданий', reward: '150', rewardType: 'tokens' }
            ];
            
            if (!user.completedTasks) user.completedTasks = [];
            
            for (const task of permanentTasks) {
                if (user.completedTasks.includes(task.id)) continue;
                
                let completed = false;
                
                if (task.id === 'first_favorite' && user.stats.totalGamesPlayed >= 1) completed = true;
                if (task.id === 'totalGames30' && user.stats.totalGamesPlayed >= 30) completed = true;
                if (task.id === 'totalGames50' && user.stats.totalGamesPlayed >= 50) completed = true;
                if (task.id === 'totalGames100' && user.stats.totalGamesPlayed >= 100) completed = true;
                if (task.id === 'totalGames150' && user.stats.totalGamesPlayed >= 150) completed = true;
                if (task.id === 'wins30' && user.stats.wins >= 30) completed = true;
                if (task.id === 'wins50' && user.stats.wins >= 50) completed = true;
                if (task.id === 'wins100' && user.stats.wins >= 100) completed = true;
                if (task.id === 'wins150' && user.stats.wins >= 150) completed = true;
                if (task.id === 'streak5' && user.streak >= 5) completed = true;
                if (task.id === 'streak10' && user.streak >= 10) completed = true;
                if (task.id === 'streak15' && user.streak >= 15) completed = true;
                if (task.id === 'streak20' && user.streak >= 20) completed = true;
                if (task.id === 'dailyTasks10' && user.dailyTasksCompletedCount >= 10) completed = true;
                if (task.id === 'dailyTasks15' && user.dailyTasksCompletedCount >= 15) completed = true;
                if (task.id === 'dailyTasks20' && user.dailyTasksCompletedCount >= 20) completed = true;
                
                if (completed) {
                    user.completedTasks.push(task.id);
                    
                    if (task.rewardType === 'tokens') {
                        user.tokens += parseInt(task.reward);
                        showAchievementNotification(`🎉 ЗАДАНИЕ ВЫПОЛНЕНО!`, `${task.name} +${task.reward} жетонов`, '🏆');
                    } else if (task.rewardType === 'colors') {
                        if (!user.unlockedUsernameColors) user.unlockedUsernameColors = [];
                        for (const color of task.rewardData) {
                            if (!user.unlockedUsernameColors.includes(color)) {
                                user.unlockedUsernameColors.push(color);
                            }
                        }
                        showAchievementNotification(`🎉 ЗАДАНИЕ ВЫПОЛНЕНО!`, `${task.name} - открыты новые цвета!`, '🎨');
                    } else if (task.rewardType === 'banner') {
                        if (!user.unlockedBannerImages) user.unlockedBannerImages = [];
                        if (!user.unlockedBannerImages.includes(task.rewardData)) {
                            user.unlockedBannerImages.push(task.rewardData);
                            showAchievementNotification(`🎉 ЗАДАНИЕ ВЫПОЛНЕНО!`, `${task.name} - открыт баннер!`, '🖼️');
                        }
                    }
                }
            }
        }

        // ПРОВЕРКА ЕЖЕДНЕВНЫХ ЗАДАНИЙ
        function checkDailyTasks(user, today) {
            if (!user.dailyTasks) return false;
            
            let anyTaskCompleted = false;
            
            for (const task of user.dailyTasks) {
                if (user.dailyTasksCompleted.includes(task.id)) continue;
                
                let isCompleted = false;
                
                if (task.id === 'favorite_game' && user.dailyProgress?.[today]?.favorite_game >= 1) isCompleted = true;
                
                if (isCompleted) {
                    user.dailyTasksCompleted.push(task.id);
                    user.tokens = (user.tokens || 100) + task.reward;
                    anyTaskCompleted = true;
                    showAchievementNotification(`✨ ЗАДАНИЕ ВЫПОЛНЕНО! ✨`, `${task.name}! +${task.reward} жетонов`, '📅');
                }
            }
            
            if (anyTaskCompleted) {
                user.dailyTasksCompletedCount = (user.dailyTasksCompletedCount || 0) + 1;
                checkPermanentTasks(user);
            }
            
            return anyTaskCompleted;
        }

        function updateUserStats(isWin, gameName, category) {
            const currentUser = localStorage.getItem('lovechord_current_user');
            if (!currentUser) return;
            
            const users = JSON.parse(localStorage.getItem('lovechord_users') || '{}');
            const user = users[currentUser];
            if (!user) return;
            
            if (!user.stats) {
                user.stats = { totalGamesPlayed: 0, totalCorrectAnswers: 0, totalWrongAnswers: 0, wins: 0 };
            }
            if (!user.tokens) user.tokens = 100;
            if (!user.unlockedUsernameColors) user.unlockedUsernameColors = ['#ffffff', '#f5c4c4', '#e8a0a0'];
            if (!user.unlockedBannerColors) user.unlockedBannerColors = ['#1e1e2f', '#2a2a3a', '#f5c4c4', '#e8a0a0'];
            if (!user.unlockedBannerImages) user.unlockedBannerImages = ['Britney0.4'];
            
            user.stats.totalGamesPlayed++;
            
            if (isWin) {
                user.stats.wins = (user.stats.wins || 0) + 1;
                user.streak = (user.streak || 0) + 1;
                showAchievementNotification('🎉 ПОБЕДА! 🎉', `Вы завершили игру!`, '🏆');
            } else {
                user.streak = 0;
            }
            
            const today = new Date().toDateString();
            if (!user.dailyProgress) user.dailyProgress = {};
            if (!user.dailyProgress[today]) user.dailyProgress[today] = {};
            
            if (gameName === 'favorite') {
                user.dailyProgress[today].favorite_game = (user.dailyProgress[today].favorite_game || 0) + 1;
            }
            
            checkPermanentTasks(user);
            checkDailyTasks(user, today);
            
            users[currentUser] = user;
            localStorage.setItem('lovechord_users', JSON.stringify(users));
            updateDailyTaskIndicator();
        }

        function updateDailyTaskIndicator() {
            const currentUser = localStorage.getItem('lovechord_current_user');
            if (!currentUser) {
                taskStatusSpan.textContent = 'Войти в профиль';
                return;
            }
            
            const users = JSON.parse(localStorage.getItem('lovechord_users') || '{}');
            const user = users[currentUser];
            if (!user) {
                taskStatusSpan.textContent = 'Войти в профиль';
                return;
            }
            
            const today = new Date().toDateString();
            const currentPlayed = user.dailyProgress?.[today]?.favorite_game || 0;
            
            let activeTask = null;
            let activeTarget = null;
            
            if (user.dailyTasks) {
                const taskExists = user.dailyTasks.some(t => t.id === 'favorite_game');
                const taskCompleted = user.dailyTasksCompleted?.includes('favorite_game') || false;
                
                if (taskExists && !taskCompleted) {
                    activeTarget = 1;
                    activeTask = 'favorite_game';
                }
            }
            
            const indicator = document.getElementById('dailyTaskIndicator');
            
            if (!activeTask) {
                taskStatusSpan.innerHTML = '✅ Задания выполнены!';
                indicator.classList.add('completed');
            } else {
                taskStatusSpan.innerHTML = `📅 Поиграть в игру: ${currentPlayed}/${activeTarget}`;
                indicator.classList.remove('completed');
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function switchCategory(category) {
            currentCategory = category;
            
            if (category === 'english') {
                mainTitle.innerHTML = '❤️ ВЫБЕРИ ЛЮБИМУЮ АНГЛИЙСКУЮ ПЕСНЮ 🎵';
                currentSongs = shuffleArray([...englishSongs]).slice(0, 32);
            } else if (category === 'russian') {
                mainTitle.innerHTML = '❤️ ВЫБЕРИ ЛЮБИМУЮ РУССКУЮ ПЕСНЮ 🎵';
                currentSongs = shuffleArray([...russianSongs]).slice(0, 32);
            } else if (category === 'modern') {
                mainTitle.innerHTML = '❤️ ВЫБЕРИ ЛЮБИМУЮ СОВРЕМЕННУЮ РУССКУЮ ПЕСНЮ 🎵';
                currentSongs = shuffleArray([...modernRussianSongs]).slice(0, 32);
            } else if (category === 'kpop') {
                mainTitle.innerHTML = '❤️ ВЫБЕРИ ЛЮБИМУЮ К-ПОП ПЕСНЮ 🎵';
                currentSongs = shuffleArray([...kpopSongs]).slice(0, 32);
            }
            
            winners = [];
            round = 1;
            matchIndex = 0;
            gameActive = true;
            gameCompleted = false;
            roundInfo.innerHTML = `Раунд 1: 32 песни → 16`;
            progressInfo.textContent = `Прогресс: 0 / 16`;
            loadMatch();
        }

        function createSongCard(song) {
            const card = document.createElement('div');
            card.className = 'song-card';
            card.setAttribute('data-song', JSON.stringify(song));
            card.innerHTML = `
                <div class="video-container">
                    ${song.embedCode}
                </div>
                <div class="song-title">${song.title}</div>
                <div class="song-artist">${song.artist}</div>
            `;
            card.onclick = () => selectSong(song, card);
            return card;
        }

        function selectSong(selectedSong, cardElement) {
            if (waitingForNext || !gameActive) return;
            waitingForNext = true;
            
            const cards = document.querySelectorAll('.song-card');
            cards.forEach(card => {
                card.style.opacity = '0.6';
            });
            cardElement.style.opacity = '1';
            cardElement.classList.add('selected');
            winners.push(selectedSong);
            
            const totalMatches = Math.floor(currentSongs.length / 2);
            progressInfo.textContent = `Прогресс: ${winners.length} / ${totalMatches}`;
            nextBtn.style.display = 'block';
            
            if (winners.length === totalMatches) {
                resultMessageDiv.innerHTML = `✨ Раунд ${round} завершён! ✨<br>Осталось ${winners.length} песен`;
                resultMessageDiv.className = "result-message correct";
            } else {
                resultMessageDiv.innerHTML = `✅ Выбрано: ${selectedSong.title} - ${selectedSong.artist}`;
                resultMessageDiv.className = "result-message correct";
            }
        }

        function loadMatch() {
            if (!gameActive) return;
            waitingForNext = false;
            nextBtn.style.display = 'none';
            resultMessageDiv.innerHTML = '';
            resultMessageDiv.className = "result-message";
            
            const startIdx = matchIndex * 2;
            const leftSong = currentSongs[startIdx];
            const rightSong = currentSongs[startIdx + 1];
            
            vsContainer.innerHTML = '';
            const leftCard = createSongCard(leftSong);
            const rightCard = createSongCard(rightSong);
            const vsDiv = document.createElement('div');
            vsDiv.className = 'vs-divider';
            vsDiv.innerHTML = 'VS';
            
            vsContainer.appendChild(leftCard);
            vsContainer.appendChild(vsDiv);
            vsContainer.appendChild(rightCard);
        }

        function nextMatch() {
            matchIndex++;
            const totalMatches = Math.floor(currentSongs.length / 2);
            if (matchIndex < totalMatches) {
                loadMatch();
            } else {
                finishRound();
            }
        }

        function finishRound() {
            if (winners.length === 1) {
                showWinner(winners[0]);
                return;
            }
            round++;
            currentSongs = [...winners];
            winners = [];
            matchIndex = 0;
            const fromCount = currentSongs.length * 2;
            const toCount = currentSongs.length;
            roundInfo.innerHTML = `Раунд ${round}: ${fromCount} песен → ${toCount}`;
            progressInfo.textContent = `Прогресс: 0 / ${Math.floor(currentSongs.length / 2)}`;
            loadMatch();
        }

        function showWinner(winnerSong) {
            vsContainer.innerHTML = '';
            roundInfo.innerHTML = `🏆 ТВОЯ ЛЮБИМАЯ ПЕСНЯ 🏆`;
            progressInfo.innerHTML = '';
            nextBtn.style.display = 'none';
            gameActive = false;
            gameCompleted = true;
            
            updateUserStats(true, 'favorite', currentCategory);
            
            const winnerCard = document.createElement('div');
            winnerCard.className = 'song-card winner-card';
            winnerCard.style.cursor = 'default';
            winnerCard.style.width = '450px';
            winnerCard.style.margin = '0 auto';
            winnerCard.innerHTML = `
                <div class="video-container">
                    ${winnerSong.embedCode}
                </div>
                <div class="song-title">🏆 ${winnerSong.title} 🏆</div>
                <div class="song-artist">${winnerSong.artist}</div>
            `;
            vsContainer.appendChild(winnerCard);
            resultMessageDiv.innerHTML = `🎉 ПОЗДРАВЛЯЕМ! 🎉<br><br>Твоя любимая песня:<br><strong>"${winnerSong.title}" - ${winnerSong.artist}</strong><br><br>У тебя отличный вкус в музыке!`;
            resultMessageDiv.className = "result-message win";
        }

        function resetTournament() {
            switchCategory(currentCategory);
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem('sonchiks_theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-theme');
            } else {
                document.body.classList.remove('light-theme');
            }
        }
        
        function toggleTheme() {
            if (document.body.classList.contains('light-theme')) {
                document.body.classList.remove('light-theme');
                localStorage.setItem('sonchiks_theme', 'dark');
            } else {
                document.body.classList.add('light-theme');
                localStorage.setItem('sonchiks_theme', 'light');
            }
        }

        function loadProfileIcon() {
            const currentUser = localStorage.getItem('lovechord_current_user');
            const users = JSON.parse(localStorage.getItem('lovechord_users') || '{}');
            
            if (currentUser && users[currentUser]) {
                const icon = document.getElementById('profileIcon');
                if (users[currentUser].avatar) {
                    icon.innerHTML = `<img src="${users[currentUser].avatar}" alt="avatar">`;
                } else {
                    icon.innerHTML = users[currentUser].username.charAt(0).toUpperCase();
                    icon.style.fontSize = '24px';
                    icon.style.fontWeight = 'bold';
                }
            }
        }

        // Экспорт функций в глобальную область
        window.openSearchModal = openSearchModal;
        window.closeSearchModal = closeSearchModal;
        window.searchUsers = searchUsers;
        window.viewProfileGlobal = viewProfileGlobal;
        window.toggleNotifications = toggleNotificationsGlobal;
        window.closeChat = closeChatGlobal;
        window.sendMessage = sendMessageGlobal;
        window.toggleTheme = toggleTheme;
        
        loadProfileIcon();
        loadTheme();
        loadGlobalUserData();
        updateDailyTaskIndicator();
        currentSongs = shuffleArray([...englishSongs]).slice(0, 32);
        loadMatch();
        
        // Обновление чата каждую секунду
        setInterval(() => { if (currentChatWithGlobal) loadChatMessagesGlobal(); }, 1000);
    </script>
</body>
</html>
