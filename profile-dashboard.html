<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой профиль - LoveChord</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-body: #1e1e2f;
            --bg-game-box: #2a2a3a;
            --bg-card: #1e1e2f;
            --text-primary: white;
            --text-secondary: #aaa;
            --btn-bg: #f5c4c4;
            --btn-hover: #e8a0a0;
            --btn-text: #333;
            --border-color: #f5c4c4;
            --accent: #ffcc00;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            background: var(--bg-body);
            color: var(--text-primary);
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }
        
        body.light-theme {
            --bg-body: #ffe4e1;
            --bg-game-box: #ffd6d6;
            --bg-card: #ffebeb;
            --text-primary: #333;
            --text-secondary: #666;
            --btn-bg: #2a2a3a;
            --btn-hover: #3a3a4a;
            --btn-text: #f5c4c4;
            --border-color: #2a2a3a;
            --accent: #ff6b6b;
        }
        
        /* ===== РАМКИ ДЛЯ АВАТАРА ===== */
        .frame-neon-red { border: 3px solid #ff0000 !important; box-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, inset 0 0 5px #ff0000 !important; }
        .frame-neon-blue { border: 3px solid #0044ff !important; box-shadow: 0 0 10px #0044ff, 0 0 20px #0044ff, inset 0 0 5px #0044ff !important; }
        .frame-neon-green { border: 3px solid #00ff44 !important; box-shadow: 0 0 10px #00ff44, 0 0 20px #00ff44, inset 0 0 5px #00ff44 !important; }
        .frame-neon-yellow { border: 3px solid #ffcc00 !important; box-shadow: 0 0 10px #ffcc00, 0 0 20px #ffcc00, inset 0 0 5px #ffcc00 !important; }
        .frame-neon-purple { border: 3px solid #cc00ff !important; box-shadow: 0 0 10px #cc00ff, 0 0 20px #cc00ff, inset 0 0 5px #cc00ff !important; }
        .frame-neon-orange { border: 3px solid #ff6600 !important; box-shadow: 0 0 10px #ff6600, 0 0 20px #ff6600, inset 0 0 5px #ff6600 !important; }
        .frame-neon-pink { border: 3px solid #ff69b4 !important; box-shadow: 0 0 10px #ff69b4, 0 0 20px #ff69b4, inset 0 0 5px #ff69b4 !important; }
        .frame-neon-cyan { border: 3px solid #00ffff !important; box-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff, inset 0 0 5px #00ffff !important; }
        .frame-metal-gold { border: 3px solid #ffd700 !important; box-shadow: 0 0 5px #ffd700, 0 0 15px #ffaa00, inset 0 0 8px #ffd700 !important; }
        .frame-metal-silver { border: 3px solid #c0c0c0 !important; box-shadow: 0 0 5px #c0c0c0, 0 0 15px #a9a9a9, inset 0 0 8px #e0e0e0 !important; }
        .frame-metal-bronze { border: 3px solid #cd7f32 !important; box-shadow: 0 0 5px #cd7f32, 0 0 15px #b87333, inset 0 0 8px #e8a060 !important; }
        .frame-metal-platinum { border: 3px solid #e5e4e2 !important; box-shadow: 0 0 5px #e5e4e2, 0 0 15px #b0c4de, inset 0 0 8px #ffffff !important; }
        .frame-diamond-blue { border: 3px solid #00bfff !important; box-shadow: 0 0 8px #00bfff, 0 0 25px #1e90ff, inset 0 0 10px #87ceeb !important; animation: diamondShine 1.5s ease-in-out infinite; }
        .frame-diamond-pink { border: 3px solid #ff69b4 !important; box-shadow: 0 0 8px #ff69b4, 0 0 25px #ff1493, inset 0 0 10px #ffb6c1 !important; animation: diamondShine 1.5s ease-in-out infinite; }
        .frame-diamond-green { border: 3px solid #00ff7f !important; box-shadow: 0 0 8px #00ff7f, 0 0 25px #00fa9a, inset 0 0 10px #7cfc00 !important; animation: diamondShine 1.5s ease-in-out infinite; }
        .frame-diamond-rainbow { border: 3px solid transparent !important; box-shadow: 0 0 10px #ff0000, 0 0 20px #ff00ff, 0 0 30px #00ffff, inset 0 0 10px #ffff00 !important; animation: rainbowShine 2s linear infinite; }
        .frame-holo-silver { border: 3px solid transparent !important; background: linear-gradient(white, white) padding-box, linear-gradient(135deg, #e0e0e0, #ffffff, #c0c0c0, #ffffff, #e0e0e0) border-box !important; animation: holoMove 3s linear infinite; }
        .frame-holo-rainbow { border: 3px solid transparent !important; background: linear-gradient(white, white) padding-box, linear-gradient(135deg, #ff0000, #ff00ff, #0000ff, #00ffff, #00ff00, #ffff00, #ff0000) border-box !important; animation: holoRainbow 3s linear infinite; }
        .frame-holo-magenta { border: 3px solid transparent !important; background: linear-gradient(white, white) padding-box, linear-gradient(135deg, #ff00ff, #ff1493, #ff4500, #ff1493, #ff00ff) border-box !important; animation: holoMove 2s linear infinite; }
        .frame-space-stars { border: 3px solid transparent !important; background: linear-gradient(#1a1a2e, #16213e) padding-box, radial-gradient(circle at 30% 40%, #ffffff 1%, transparent 2%) border-box !important; box-shadow: 0 0 15px #4a00e0 !important; animation: starTwinkle 2s ease-in-out infinite; }
        .frame-space-nebula { border: 3px solid transparent !important; background: linear-gradient(#0f0c29, #302b63, #24243e) padding-box, repeating-linear-gradient(45deg, #ff00ff, #00ffff, #ff00ff) border-box !important; animation: nebulaPulse 3s ease-in-out infinite; }
        .frame-magic-fire { border: 3px solid transparent !important; background: linear-gradient(white, white) padding-box, repeating-linear-gradient(0deg, #ff3300, #ff6600, #ff9900, #ffcc00, #ff9900, #ff6600, #ff3300) border-box !important; animation: firePulse 1s linear infinite; }
        .frame-magic-ice { border: 3px solid transparent !important; background: linear-gradient(white, white) padding-box, repeating-linear-gradient(0deg, #00bfff, #87ceeb, #e0ffff, #f0f8ff, #e0ffff, #87ceeb, #00bfff) border-box !important; animation: icePulse 2s ease-in-out infinite; }
        
        @keyframes diamondShine { 0% { filter: brightness(1); } 50% { filter: brightness(1.5) drop-shadow(0 0 5px gold); } 100% { filter: brightness(1); } }
        @keyframes rainbowShine { 0% { filter: hue-rotate(0deg) brightness(1); } 50% { filter: hue-rotate(180deg) brightness(1.3); } 100% { filter: hue-rotate(360deg) brightness(1); } }
        @keyframes holoMove { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        @keyframes holoRainbow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        @keyframes starTwinkle { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; box-shadow: 0 0 25px #7b2cbf; } }
        @keyframes nebulaPulse { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.3) hue-rotate(30deg); } }
        @keyframes firePulse { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        @keyframes icePulse { 0%, 100% { box-shadow: 0 0 5px #00bfff, 0 0 10px #87ceeb; } 50% { box-shadow: 0 0 15px #00ffff, 0 0 25px #e0ffff; } }
        
        .LoveChord-container { position: fixed; top: 20px; left: 20px; text-align: center; z-index: 1000; }
        .LoveChord-btn { background: var(--btn-bg); color: var(--btn-text); border: none; padding: 10px 25px; border-radius: 30px; cursor: pointer; transition: 0.2s; display: block; text-align: center; text-decoration: none; }
        .LoveChord-btn:hover { background: var(--btn-hover); transform: scale(1.02); }
        .LoveChord-main { display: block; font-size: 20px; font-weight: 800; font-family: 'Montserrat', sans-serif; letter-spacing: 2px; font-variant: small-caps; }
        .about-songs { display: block; font-size: 9px; text-decoration: none; margin-top: 3px; font-weight: normal; font-family: 'Montserrat', sans-serif; }
        
        .search-icon { position: fixed; top: 20px; right: 140px; width: 45px; height: 45px; border-radius: 50%; background: var(--btn-bg); color: var(--btn-text); border: 2px solid var(--border-color); cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; font-size: 22px; z-index: 1000; }
        .search-icon:hover { transform: scale(1.05); background: var(--btn-hover); }
        .notification-icon { position: fixed; top: 20px; right: 200px; width: 45px; height: 45px; border-radius: 50%; background: var(--btn-bg); color: var(--btn-text); border: 2px solid var(--border-color); cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; font-size: 22px; z-index: 1000; }
        .notification-icon:hover { transform: scale(1.05); background: var(--btn-hover); }
        .notification-badge { position: absolute; top: -5px; right: -5px; background: #ff4444; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; display: flex; align-items: center; justify-content: center; }
        .profile-icon { position: fixed; top: 20px; right: 80px; width: 45px; height: 45px; border-radius: 50%; background: var(--btn-bg); color: var(--btn-text); border: 2px solid var(--border-color); cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; font-size: 22px; z-index: 1000; overflow: hidden; }
        .profile-icon:hover { transform: scale(1.05); background: var(--btn-hover); }
        .profile-icon img { width: 100%; height: 100%; object-fit: cover; }
        
        .theme-toggle-bottom { position: fixed; bottom: 20px; right: 20px; background: var(--btn-bg); color: var(--btn-text); border: none; padding: 10px 15px; border-radius: 30px; cursor: pointer; transition: 0.2s; font-size: 16px; font-weight: 600; z-index: 1000; font-family: 'Montserrat', sans-serif; }
        .theme-toggle-bottom:hover { background: var(--btn-hover); transform: scale(1.02); }
        
        .nav-menu { display: flex; justify-content: flex-start; align-items: center; gap: 12px; margin-bottom: 30px; margin-top: 60px; overflow-x: auto; overflow-y: hidden; white-space: nowrap; padding-bottom: 10px; cursor: grab; }
        .nav-menu:active { cursor: grabbing; }
        .nav-menu::-webkit-scrollbar { height: 5px; }
        .nav-menu::-webkit-scrollbar-track { background: var(--bg-game-box); border-radius: 10px; }
        .nav-menu::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        .nav-btn { background: var(--bg-game-box); border: 2px solid var(--border-color); padding: 10px 20px; font-size: 14px; border-radius: 30px; cursor: pointer; transition: 0.2s; color: var(--border-color); font-weight: 600; font-family: 'Montserrat', sans-serif; white-space: nowrap; flex-shrink: 0; }
        .nav-btn:hover:not(.active) { background: var(--btn-bg); color: var(--btn-text); }
        .nav-btn.active { background: var(--btn-bg); color: var(--btn-text); cursor: default; opacity: 0.7; }
        
        /* ПРОФИЛЬ - базовые стили */
        .profile-container { 
            max-width: 900px; 
            margin: 100px auto 40px; 
            border-radius: 20px; 
            overflow: hidden; 
            border: 2px solid var(--border-color);
            transition: all 0.3s;
            position: relative;
        }
        .banner { height: 150px; cursor: pointer; transition: 0.2s; background-size: cover; background-position: center; }
        .banner:hover { opacity: 0.8; }
        
        .avatar-section { position: relative; margin-top: -60px; padding: 0 20px; display: flex; align-items: flex-end; gap: 20px; flex-wrap: wrap; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; cursor: pointer; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 50px; font-weight: bold; transition: 0.2s; position: relative; background-clip: border-box; }
        .avatar:hover { transform: scale(1.02); opacity: 0.8; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .username-area { flex: 1; text-align: left; padding-bottom: 15px; }
        .username { font-size: 28px; font-weight: bold; cursor: pointer; display: inline-block; }
        .username:hover { text-decoration: underline; }
        .username-change-info { font-size: 12px; margin-top: 5px; cursor: pointer; }
        
        .profile-buttons { display: flex; justify-content: center; gap: 15px; padding: 30px; flex-wrap: wrap; }
        .profile-btn { border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: 700; font-family: 'Montserrat', sans-serif; font-size: 14px; transition: 0.2s; }
        .profile-btn:hover { transform: scale(1.02); }
        .logout-btn { background: #888; color: white; }
        .promo-btn { background: linear-gradient(135deg, #ffcc00, #ffaa00); color: #333; }
        .achievements-btn { background: linear-gradient(135deg, #ff6b6b, #c44c4c); color: white; }
        .friends-btn { background: linear-gradient(135deg, #4ecdc4, #45b7d1); color: white; }
        
        .content-panel { padding: 20px; border-top: 1px solid var(--border-color); }
        .content-panel h3 { margin-bottom: 20px; }
        
        .stats-grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .stat-card { padding: 20px; border-radius: 15px; min-width: 130px; border: 1px solid var(--border-color); }
        .stat-number { font-size: 32px; font-weight: bold; }
        .stat-label { font-size: 14px; margin-top: 5px; }
        
        .search-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid var(--border-color); border-radius: 20px; padding: 30px; z-index: 2000; width: 90%; max-width: 500px; }
        .search-modal.show { display: block; }
        .search-input { width: 100%; padding: 12px; border-radius: 30px; border: 2px solid var(--border-color); font-size: 16px; margin-bottom: 20px; }
        .search-results { max-height: 300px; overflow-y: auto; }
        .search-result-item { padding: 10px; margin: 5px 0; border-radius: 15px; cursor: pointer; transition: 0.2s; }
        .search-result-item:hover { transform: scale(1.02); }
        .close-modal { border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; margin-top: 15px; }
        
        .notification-panel { position: fixed; top: 70px; right: 20px; width: 300px; border: 2px solid var(--border-color); border-radius: 15px; z-index: 2000; display: none; }
        .notification-panel.show { display: block; }
        .notification-item { padding: 12px; border-bottom: 1px solid var(--border-color); cursor: pointer; }
        .notification-item:hover { background: rgba(0,0,0,0.1); }
        .notification-actions { display: flex; gap: 10px; margin-top: 8px; }
        .notif-accept, .notif-reject { padding: 5px 12px; border-radius: 20px; border: none; cursor: pointer; font-size: 12px; }
        .notif-accept { background: #00aa44; color: white; }
        .notif-reject { background: #aa0044; color: white; }
        
        .chat-modal { display: none; position: fixed; bottom: 20px; right: 20px; width: 350px; height: 450px; border: 2px solid var(--border-color); border-radius: 15px; z-index: 2000; flex-direction: column; }
        .chat-modal.show { display: flex; }
        .chat-header { padding: 12px; border-radius: 13px 13px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .chat-messages { flex: 1; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .message { max-width: 80%; padding: 8px 12px; border-radius: 15px; }
        .message.sent { background: var(--accent); color: #333; align-self: flex-end; }
        .message.received { background: var(--bg-card); align-self: flex-start; }
        .chat-input-area { display: flex; padding: 12px; gap: 8px; border-top: 1px solid var(--border-color); }
        .chat-input { flex: 1; padding: 8px; border-radius: 20px; border: 1px solid var(--border-color); }
        .chat-send { border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; }
        
        .task-list { text-align: left; max-width: 650px; margin: 0 auto; }
        .task-item { padding: 15px; margin: 10px 0; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; border-left: 4px solid var(--accent); }
        .task-completed { color: #00aa44; font-weight: bold; }
        .task-incomplete { color: var(--accent); }
        
        .shop-items { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px; }
        .shop-item { border-radius: 15px; padding: 12px; width: 140px; cursor: pointer; transition: 0.2s; border: 2px solid var(--border-color); }
        .shop-item:hover { transform: scale(1.05); border-color: var(--accent); }
        .shop-item.locked { opacity: 0.5; }
        .shop-item-price { font-weight: bold; margin-top: 8px; font-size: 14px; }
        .shop-item-banner { width: 100%; height: 60px; border-radius: 10px; background-size: cover; background-position: center; margin-bottom: 8px; }
        .shop-item-color { width: 40px; height: 40px; border-radius: 50%; margin: 0 auto 8px; border: 2px solid white; }
        .shop-item-frame { width: 50px; height: 50px; border-radius: 50%; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 2px solid white; transition: 0.2s; }
        .shop-item-frame:hover { transform: scale(1.05); }
        
        .balance { font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        
        .promo-section { margin: 20px 0; padding: 20px; border-radius: 20px; border: 2px solid var(--border-color); }
        .promo-title { font-size: 20px; font-weight: bold; margin-bottom: 15px; }
        .promo-input-group { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .promo-input { padding: 12px 20px; font-size: 16px; border-radius: 30px; border: 2px solid var(--border-color); width: 250px; text-align: center; }
        .promo-submit { background: linear-gradient(135deg, #ffcc00, #ffaa00); color: #333; border: none; padding: 12px 30px; border-radius: 30px; cursor: pointer; font-weight: 700; font-size: 16px; }
        .promo-submit:hover { transform: scale(1.02); }
        .promo-message { margin-top: 15px; font-size: 14px; }
        .promo-message.success { color: #00ffaa; }
        .promo-message.error { color: #ff5555; }
        
        .notification { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #00aa44; border-radius: 20px; padding: 15px 30px; z-index: 2000; text-align: center; animation: fadeInOut 2.5s ease-in-out; color: white; font-weight: bold; white-space: nowrap; }
        .notification.error { background: #aa0044; }
        @keyframes fadeInOut { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); } 15% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 85% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); } }
        
        .color-picker, .banner-picker, .frame-picker, .theme-picker { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px; border-radius: 20px; border: 2px solid var(--border-color); z-index: 2000; display: none; max-width: 500px; max-height: 80vh; overflow-y: auto; }
        .color-picker.show, .banner-picker.show, .frame-picker.show, .theme-picker.show { display: block; }
        .color-options, .banner-options, .frame-options, .theme-options { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin: 20px 0; justify-content: center; }
        .color-option { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 2px solid white; }
        .banner-option { width: 80px; height: 50px; border-radius: 10px; cursor: pointer; background-size: cover; background-position: center; border: 2px solid white; }
        .frame-option { width: 60px; height: 60px; border-radius: 50%; cursor: pointer; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 24px; transition: 0.2s; }
        .frame-option:hover { transform: scale(1.05); }
        .theme-option { width: 100%; padding: 15px; border-radius: 15px; cursor: pointer; border: 2px solid var(--border-color); text-align: center; transition: 0.2s; }
        .theme-option:hover { transform: scale(1.02); border-color: var(--accent); }
        .theme-option.active { border-color: var(--accent); background: var(--accent); color: var(--btn-text); }
        .close-picker { border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; margin-top: 10px; }
        .hidden-input { display: none; }
        
        .achievements-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-top: 20px; }
        .achievement-card { border-radius: 15px; padding: 15px; border: 2px solid var(--border-color); transition: 0.2s; display: flex; align-items: center; gap: 15px; }
        .achievement-card.unlocked { border-color: var(--accent); background: linear-gradient(135deg, var(--bg-card), var(--bg-game-box)); }
        .achievement-icon { font-size: 40px; min-width: 60px; text-align: center; }
        .achievement-info { flex: 1; text-align: left; }
        .achievement-name { font-weight: bold; font-size: 16px; }
        .achievement-desc { font-size: 12px; margin-top: 5px; }
        .achievement-reward { font-size: 12px; color: #00aa44; margin-top: 5px; }
        .achievement-badge { font-size: 24px; min-width: 50px; text-align: center; }
        .achievement-badge.locked { opacity: 0.3; }
        .achievement-category { margin-bottom: 30px; }
        .achievement-category h4 { margin-bottom: 15px; text-align: left; font-size: 20px; border-left: 4px solid var(--accent); padding-left: 15px; }
        
        .view-profile-container { max-width: 900px; margin: 100px auto 40px; border-radius: 20px; overflow: hidden; border: 2px solid var(--border-color); transition: all 0.3s; position: relative; }
        .view-profile-header-actions { display: flex; justify-content: flex-end; padding: 15px; gap: 10px; }
        .add-friend-btn { border: none; padding: 10px 25px; border-radius: 30px; cursor: pointer; font-weight: 700; }
        .back-btn { background: #888; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; color: white; }
        
        /* ===== ТЕМЫ ОФОРМЛЕНИЯ ДЛЯ ПРОФИЛЯ (без переопределения цвета ника) ===== */
        .profile-container.theme-floral { background: #ffe4ec; border-color: #ff69b4; }
        .profile-container.theme-floral .banner { background: #ffb7c5; }
        .profile-container.theme-floral .avatar { background: #ffb7c5; border-color: #ff69b4; color: #4a2a3a; }
        .profile-container.theme-floral .profile-btn { background: #ffb7c5; color: #4a2a3a; }
        .profile-container.theme-floral .profile-btn:hover { background: #ff9eb5; }
        .profile-container.theme-floral .stat-card { background: #fff5f8; border-color: #ff69b4; color: #4a2a3a; }
        .profile-container.theme-floral .stat-number { color: #ff69b4; }
        .profile-container.theme-floral .stat-label { color: #8a6a7a; }
        .profile-container.theme-floral .content-panel { border-top-color: #ff69b4; }

let userData = null, currentUser = null, viewingProfile = null, currentChatWith = null;

function showNotification(msg, isError) {
    let n = document.createElement('div');
    n.className = 'notification' + (isError ? ' error' : '');
    n.textContent = msg;
    document.body.appendChild(n);
    setTimeout(() => n.remove(), 2500);
}

function saveUserData() {
    let users = JSON.parse(localStorage.getItem('lovechord_users') || '{}');
    users[currentUser] = userData;
    localStorage.setItem('lovechord_users', JSON.stringify(users));
}

function applyAvatarFrame() {
    let avatarDiv = document.getElementById('avatar');
    if (!avatarDiv) return;
    let allFrameClasses = avatarFrames.map(f => f.class);
    avatarDiv.classList.remove(...allFrameClasses);
    if (userData.currentAvatarFrame && userData.currentAvatarFrame !== 'none') {
        avatarDiv.classList.add(userData.currentAvatarFrame);
    }
}

function applyUsernameColor() {
    const usernameEl = document.getElementById('username');
    if (usernameEl && userData.usernameColor) {
        usernameEl.style.color = userData.usernameColor;
        usernameEl.style.setProperty('color', userData.usernameColor, 'important');
    }
}

function applyProfileTheme(themeClass) {
    let profileDiv = document.getElementById('profileContainer');
    if (!profileDiv) return;
    profileDiv.classList.remove('theme-floral', 'theme-cosmic', 'theme-forest', 'theme-luxury', 'theme-magic');
    if (themeClass && themeClass !== '') {
        profileDiv.classList.add(themeClass);
    }
}

function buyTheme(themeId) {
    let theme = themes.find(t => t.id === themeId);
    if (!theme) return;
    if (userData.unlockedThemes && userData.unlockedThemes.includes(themeId)) {
        userData.currentTheme = theme.class;
        applyProfileTheme(userData.currentTheme);
        saveUserData();
        applyUsernameColor();
        showNotification('Тема "' + theme.name + '" применена к профилю!', false);
        return;
    }
    if (userData.tokens >= theme.price) {
        if (!userData.unlockedThemes) userData.unlockedThemes = [];
        userData.unlockedThemes.push(themeId);
        userData.tokens -= theme.price;
        userData.currentTheme = theme.class;
        applyProfileTheme(userData.currentTheme);
        saveUserData();
        applyUsernameColor();
        showNotification('Вы купили тему "' + theme.name + '" за ' + theme.price + ' жетонов!', false);
        showShop();
    } else {
        showNotification('Недостаточно жетонов! Нужно ' + theme.price + ' жетонов.', true);
    }
}

function showThemePicker() {
    let picker = document.getElementById('themePicker');
    let opts = document.getElementById('themeOptions');
    opts.innerHTML = '';
    for (let t of themes) {
        let owned = userData.unlockedThemes && userData.unlockedThemes.includes(t.id);
        let isActive = (userData.currentTheme === t.class);
        let div = document.createElement('div');
        div.className = 'theme-option' + (isActive ? ' active' : '');
        div.innerHTML = '<div style="font-size:30px;">' + t.icon + '</div><div style="font-weight:bold;">' + t.name + '</div><div style="font-size:12px;">' + (owned ? (isActive ? '✓ Активна' : '✅ В коллекции') : (t.price + ' жетонов')) + '</div>';
        div.onclick = () => buyTheme(t.id);
        opts.appendChild(div);
    }
    picker.classList.add('show');
}

function closeThemePicker() {
    document.getElementById('themePicker').classList.remove('show');
}

function checkAchievements() {
    if (!userData.achievements) userData.achievements = [];
    for (let ach of achievementsList) {
        if (userData.achievements.includes(ach.id)) continue;
        let val = 0;
        if (ach.type === 'colors') val = userData.unlockedUsernameColors.length;
        else if (ach.type === 'correct') val = userData.stats.totalCorrectAnswers || 0;
        else if (ach.type === 'games') val = userData.stats.totalGamesPlayed || 0;
        else if (ach.type === 'streak') val = userData.gameStreak || 0;
        else if (ach.type === 'fast') val = userData.fastestAnswer || 99;
        else if (ach.type === 'tokens') val = userData.tokens || 0;
        else if (ach.type === 'promo') val = userData.usedPromoCodes ? userData.usedPromoCodes.length : 0;
        else if (ach.type === 'daily') val = userData.dailyLoginStreak || 0;
        
        let completed = (ach.type === 'fast') ? (val <= ach.need) : (val >= ach.need);
        if (completed) {
            userData.achievements.push(ach.id);
            userData.tokens += ach.reward;
            showNotification('🏆 ДОСТИЖЕНИЕ РАЗБЛОКИРОВАНО! 🏆\n' + ach.name + ' +' + ach.reward + ' жетонов!', false);
        }
    }
    saveUserData();
}

function buyFrame(frameId) {
    let frame = avatarFrames.find(f => f.id === frameId);
    if (!frame) return;
    if (userData.unlockedAvatarFrames && userData.unlockedAvatarFrames.includes(frameId)) {
        userData.currentAvatarFrame = frame.class;
        saveUserData();
        applyAvatarFrame();
        showNotification('Рамка "' + frame.name + '" надета!', false);
        return;
    }
    if (userData.tokens >= frame.price) {
        if (!userData.unlockedAvatarFrames) userData.unlockedAvatarFrames = [];
        userData.unlockedAvatarFrames.push(frameId);
        userData.tokens -= frame.price;
        userData.currentAvatarFrame = frame.class;
        saveUserData();
        applyAvatarFrame();
        showNotification('Вы купили и надели рамку "' + frame.name + '" за ' + frame.price + ' жетонов!', false);
        showShop();
    } else {
        showNotification('Недостаточно жетонов! Нужно ' + frame.price + ' жетонов.', true);
    }
}

    for (let f of avatarFrames) {

        div.title = f.name + (owned ? ' (надеть)' : ' (' + f.price + ' жетонов)');

// ===== ДРУЗЬЯ И УВЕДОМЛЕНИЯ =====
function sendFriendRequest(toUser) {
    if (toUser === currentUser) { showNotification('Нельзя добавить самого себя!', true); return; }
    let users = JSON.parse(localStorage.getItem('lovechord_users') || '{}');
    if (!users[toUser]) { showNotification('Пользователь не найден!', true); return; }
    if (userData.friends && userData.friends.includes(toUser)) { showNotification('Этот пользователь уже в друзьях!', true); return; }
    
    if (!users[toUser].friendRequests) users[toUser].friendRequests = [];
    if (users[toUser].friendRequests.includes(currentUser)) { showNotification('Запрос уже отправлен!', true); return; }
    
    users[toUser].friendRequests.push(currentUser);
    localStorage.setItem('lovechord_users', JSON.stringify(users));
    showNotification('Запрос в друзья отправлен!', false);
}

function acceptFriendRequest(fromUser) {
    let users = JSON.parse(localStorage.getItem('lovechord_users') || '{}');
    if (!userData.friends) userData.friends = [];
    if (!userData.friends.includes(fromUser)) userData.friends.push(fromUser);
    if (!users[fromUser].friends) users[fromUser].friends = [];
    if (!users[fromUser].friends.includes(currentUser)) users[fromUser].friends.push(currentUser);
    
    let index = userData.friendRequests.indexOf(fromUser);
    if (index !== -1) userData.friendRequests.splice(index, 1);
    
    if (!userData.chats) userData.chats = {};
    if (!userData.chats[fromUser]) userData.chats[fromUser] = [];
    
    localStorage.setItem('lovechord_users', JSON.stringify(users));
    saveUserData();
    showNotification('Вы приняли запрос в друзья!', false);
    updateNotificationBadge();
    if (document.getElementById('contentPanel').innerHTML.includes('Друзья')) showFriends();
}

function rejectFriendRequest(fromUser) {
    let users = JSON.parse(localStorage.getItem('lovechord_users') || '{}');
    let index = userData.friendRequests.indexOf(fromUser);
    if (index !== -1) userData.friendRequests.splice(index, 1);
    saveUserData();
    
    if (users[fromUser]) {
        if (!users[fromUser].notifications) users[fromUser].notifications = [];
        users[fromUser].notifications.push({ type: 'rejected', from: currentUser });
        localStorage.setItem('lovechord_users', JSON.stringify(users));
    }
    showNotification('Запрос отклонен', false);
    updateNotificationBadge();
}

function sendMessage() {
    let input = document.getElementById('chatInput');
    let text = input.value.trim();
    if (!text || !currentChatWith) return;
    
    if (!userData.chats) userData.chats = {};
    if (!userData.chats[currentChatWith]) userData.chats[currentChatWith] = [];
    userData.chats[currentChatWith].push({ from: currentUser, text: text, time: Date.now() });
    saveUserData();
    
    let users = JSON.parse(localStorage.getItem('lovechord_users') || '{}');
    if (users[currentChatWith]) {
        if (!users[currentChatWith].chats) users[currentChatWith].chats = {};
        if (!users[currentChatWith].chats[currentUser]) users[currentChatWith].chats[currentUser] = [];
        users[currentChatWith].chats[currentUser].push({ from: currentUser, text: text, time: Date.now() });
        localStorage.setItem('lovechord_users', JSON.stringify(users));
    }
    
    input.value = '';
    loadChatMessages();
}

function loadChatMessages() {
    let container = document.getElementById('chatMessages');
    if (!container || !currentChatWith) return;
    let messages = (userData.chats && userData.chats[currentChatWith]) ? userData.chats[currentChatWith] : [];
    container.innerHTML = '';
    for (let msg of messages) {
        let div = document.createElement('div');
        div.className = 'message ' + (msg.from === currentUser ? 'sent' : 'received');
        div.textContent = msg.text;
        container.appendChild(div);
    }
    container.scrollTop = container.scrollHeight;
}

function openChatWith(friendName) {
    currentChatWith = friendName;
    let modal = document.getElementById('chatModal');
    document.getElementById('chatFriendName').textContent = friendName;
    modal.classList.add('show');
    loadChatMessages();
}

function closeChat() {
    document.getElementById('chatModal').classList.remove('show');
    currentChatWith = null;
}

function updateNotificationBadge() {
    let count = (userData.friendRequests ? userData.friendRequests.length : 0) + (userData.notifications ? userData.notifications.length : 0);
    let badge = document.getElementById('notificationBadge');
    if (count > 0) { badge.textContent = count; badge.style.display = 'flex'; }
    else badge.style.display = 'none';
}

function toggleNotifications() {
    let panel = document.getElementById('notificationPanel');
    if (panel.classList.contains('show')) panel.classList.remove('show');
    else {
        let list = document.getElementById('notificationsList');
        list.innerHTML = '';
        if (userData.friendRequests && userData.friendRequests.length > 0) {
            for (let req of userData.friendRequests) {
                let div = document.createElement('div');
                div.className = 'notification-item';
                div.innerHTML = `<div><strong>${req}</strong> хочет добавить вас в друзья</div>
                    <div class="notification-actions">
                        <button class="notif-accept" onclick="acceptFriendRequest('${req}')">Принять</button>
                        <button class="notif-reject" onclick="rejectFriendRequest('${req}')">Отклонить</button>
                    </div>`;
                list.appendChild(div);
            }
        }
        if (userData.notifications && userData.notifications.length > 0) {
            for (let notif of userData.notifications) {
                let div = document.createElement('div');
                div.className = 'notification-item';
                if (notif.type === 'rejected') {
                    div.innerHTML = `<div><strong>${notif.from}</strong> отклонил ваш запрос в друзья</div>`;
                }
                list.appendChild(div);
            }
        }
        if (list.children.length === 0) {
            list.innerHTML = '<div style="padding:12px;">Нет уведомлений</div>';
        }
        panel.classList.add('show');
    }
}

    if (!query) { document.getElementById('searchResults').innerHTML = ''; return; }
    let users = JSON.parse(localStorage.getItem('lovechord_users') || '{}');

    for (let name in users) {

// ===== ОСТАЛЬНЫЕ ФУНКЦИИ =====
function loadUserData() {
    currentUser = localStorage.getItem('lovechord_current_user');
    let users = JSON.parse(localStorage.getItem('lovechord_users') || '{}');
    if (!currentUser || !users[currentUser]) { window.location.href = 'profile.html'; return; }
    
    userData = users[currentUser];
    if (!userData.stats) userData.stats = { totalGamesPlayed: 0, totalCorrectAnswers: 0, totalWrongAnswers: 0, wins: 0 };
    if (!userData.tokens) userData.tokens = 100;
    if (!userData.unlockedUsernameColors) userData.unlockedUsernameColors = ['#ffffff', '#f5c4c4', '#e8a0a0'];
    if (!userData.unlockedBannerColors) userData.unlockedBannerColors = ['#1e1e2f', '#2a2a3a', '#f5c4c4', '#e8a0a0'];
    if (!userData.unlockedBannerImages) userData.unlockedBannerImages = ['Britney0.4'];
    if (!userData.unlockedAvatarFrames) userData.unlockedAvatarFrames = [];
    if (!userData.currentAvatarFrame) userData.currentAvatarFrame = 'none';
    if (!userData.unlockedThemes) userData.unlockedThemes = ['default'];
    if (!userData.currentTheme) userData.currentTheme = '';
    if (!userData.usernameColor) userData.usernameColor = '#ffffff';
    if (!userData.currentBanner) userData.currentBanner = '#2a2a3a';
    if (!userData.currentBannerType) userData.currentBannerType = 'color';
    if (!userData.completedTasks) userData.completedTasks = [];
    if (!userData.dailyTasksCompleted) userData.dailyTasksCompleted = [];
    if (!userData.dailyTasksCompletedCount) userData.dailyTasksCompletedCount = 0;
    if (!userData.gameStreak) userData.gameStreak = 0;
    if (!userData.hasCustomBanner) userData.hasCustomBanner = false;
    if (!userData.usedPromoCodes) userData.usedPromoCodes = [];
    if (!userData.achievements) userData.achievements = [];
    if (!userData.fastestAnswer) userData.fastestAnswer = 99;
    if (!userData.dailyLoginStreak) userData.dailyLoginStreak = 1;
    if (!userData.lastLoginDate) userData.lastLoginDate = new Date().toDateString();
    if (!userData.friends) userData.friends = [];
    if (!userData.friendRequests) userData.friendRequests = [];
    if (!userData.notifications) userData.notifications = [];
    if (!userData.chats) userData.chats = {};
    
    let today = new Date().toDateString();
    if (userData.lastLoginDate !== today) {
        let yesterday = new Date(Date.now() - 86400000).toDateString();
        userData.dailyLoginStreak = (userData.lastLoginDate === yesterday) ? (userData.dailyLoginStreak + 1) : 1;
        userData.lastLoginDate = today;
        saveUserData();
    }
    
    if (!userData.dailyTasks || userData.lastDailyDate !== today) {
        let shuffled = [...dailyTasksList];
        for (let i = shuffled.length - 1; i > 0; i--) {
            let j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        userData.dailyTasks = shuffled.slice(0, 3);
        userData.dailyTasksCompleted = [];
        userData.lastDailyDate = today;
    }
    
    document.getElementById('username').textContent = userData.username;
    applyUsernameColor();
    
    let lastChange = userData.lastUsernameChange, now = Date.now(), weekMs = 7 * 24 * 60 * 60 * 1000;
    let infoDiv = document.getElementById('usernameInfo');
    if (!lastChange || (now - lastChange) >= weekMs) {
        infoDiv.innerHTML = '✏️ Нажмите, чтобы изменить имя (доступно)';
        infoDiv.style.color = '#00aa44';
        infoDiv.onclick = () => changeUsername();
    } else {
        let daysLeft = Math.ceil((weekMs - (now - lastChange)) / (24 * 60 * 60 * 1000));
        infoDiv.innerHTML = '⏰ Изменение имени будет доступно через ' + daysLeft + ' дн.';
        infoDiv.style.color = '#ff8888';
        infoDiv.onclick = null;
    }
    
    let avatar = document.getElementById('avatar');
    if (userData.avatar) avatar.innerHTML = '<img src="' + userData.avatar + '">';
    else { avatar.innerHTML = userData.username.charAt(0).toUpperCase(); avatar.style.fontSize = '50px'; avatar.style.fontWeight = 'bold'; }
    
    let banner = document.getElementById('banner');
    if (userData.currentBannerType === 'color') { banner.style.background = userData.currentBanner; banner.style.backgroundSize = 'auto'; }
    else banner.style.background = 'url(' + userData.currentBanner + ') center/cover';
    
    applyAvatarFrame();
    applyProfileTheme(userData.currentTheme);
    checkAchievements();
    saveUserData();
    checkTasks();
    updateNotificationBadge();
    showStats();
}

}

function showPromo() {
    document.getElementById('contentPanel').innerHTML = '<div class="promo-section"><div class="promo-title">🎁 ВВЕДИ ПРОМОКОД 🎁</div>' +
        '<div class="promo-input-group"><input type="text" id="promoInput" class="promo-input" placeholder="Введите промокод">' +
        '<button class="promo-submit" onclick="activatePromoCode()">Активировать</button></div>' +
        '<div id="promoMessage" class="promo-message">Введите промокод и получите награду!</div></div>' +
        '<div class="balance" style="margin-top:20px;">🪙 Баланс: ' + userData.tokens + ' жетонов</div>';
}

function activatePromoCode() {
    let code = document.getElementById('promoInput').value.trim();
    let msg = document.getElementById('promoMessage');
    if (userData.usedPromoCodes && userData.usedPromoCodes.includes(code)) {
        msg.innerHTML = '❌ Данный промокод уже активирован!';
        msg.className = 'promo-message error';
        return;
    }
    if (code === 'Creator2009') {
        userData.tokens += 1000;
        if (!userData.usedPromoCodes) userData.usedPromoCodes = [];
        userData.usedPromoCodes.push('Creator2009');
        saveUserData();
        checkAchievements();
        msg.innerHTML = '✅ Промокод активирован! Вы получили 1000 жетонов! 🎉';
        msg.className = 'promo-message success';
        let balanceDiv = document.querySelector('.balance');
        if (balanceDiv) balanceDiv.innerHTML = '🪙 Баланс: ' + userData.tokens + ' жетонов';
        showNotification('🎉 Промокод активирован! +1000 жетонов!', false);
    } else if (code === 'ForCreator') {
        userData.tokens += 50000;
        if (!userData.usedPromoCodes) userData.usedPromoCodes = [];
        userData.usedPromoCodes.push('ForCreator');
        saveUserData();
        checkAchievements();
        msg.innerHTML = '✅ Промокод активирован! Вы получили 50000 жетонов! 🎉';
        msg.className = 'promo-message success';
        let balanceDiv = document.querySelector('.balance');
        if (balanceDiv) balanceDiv.innerHTML = '🪙 Баланс: ' + userData.tokens + ' жетонов';
        showNotification('🎉 Промокод активирован! +50000 жетонов!', false);
    } else {
        msg.innerHTML = '❌ Неверный промокод! Попробуйте ещё раз.';
        msg.className = 'promo-message error';
    }
}

function buyColor(color) {
    if (userData.unlockedUsernameColors.includes(color)) {
        userData.usernameColor = color;
        saveUserData();
        applyUsernameColor();
        showNotification('Цвет "' + usernameColors[color].name + '" применен!', false);
        return;
    }
    let price = usernameColors[color].price;
    if (userData.tokens >= price) {
        userData.unlockedUsernameColors.push(color);
        userData.tokens -= price;
        userData.usernameColor = color;
        saveUserData();
        applyUsernameColor();
        checkAchievements();
        showNotification('Вы купили цвет "' + usernameColors[color].name + '" за ' + price + ' жетонов!', false);
        showShop();
    } else showNotification('Недостаточно жетонов! Нужно ' + price + ' жетонов.', true);
}

function buyBannerColor(color) {
    if (userData.unlockedBannerColors.includes(color)) {
        userData.currentBanner = color;
        userData.currentBannerType = 'color';
        document.getElementById('banner').style.background = color;
        saveUserData();
        showNotification('Цвет баннера применен!', false);
        return;
    }
    let banner = bannerColors.find(b => b.color === color);
    if (userData.tokens >= banner.price) {
        userData.unlockedBannerColors.push(color);
        userData.tokens -= banner.price;
        userData.currentBanner = color;
        userData.currentBannerType = 'color';
        document.getElementById('banner').style.background = color;
        saveUserData();
        showNotification('Вы купили цвет баннера за ' + banner.price + ' жетонов!', false);
        showShop();
    } else showNotification('Недостаточно жетонов!', true);
}

function buyBannerImage(id) {
    if (userData.unlockedBannerImages.includes(id)) {
        userData.currentBanner = bannerImages[id].url;
        userData.currentBannerType = 'image';
        document.getElementById('banner').style.background = 'url(' + bannerImages[id].url + ') center/cover';
        saveUserData();
        showNotification('Баннер "' + bannerImages[id].name + '" применен!', false);
        return;
    }
    let banner = bannerImages[id];
    if (userData.tokens >= banner.price) {
        userData.unlockedBannerImages.push(id);
        userData.tokens -= banner.price;
        userData.currentBanner = banner.url;
        userData.currentBannerType = 'image';
        document.getElementById('banner').style.background = 'url(' + banner.url + ') center/cover';
        saveUserData();
        showNotification('Вы купили баннер "' + banner.name + '" за ' + banner.price + ' жетонов!', false);
        showShop();
    } else showNotification('Недостаточно жетонов!', true);
}

function buyCustomBanner() {
    if (userData.hasCustomBanner) { showNotification('У вас уже есть эта функция!', false); return; }
    if (userData.tokens >= 5000) {
        userData.hasCustomBanner = true;
        userData.tokens -= 5000;
        saveUserData();
        showNotification('Вы купили возможность ставить свой баннер за 5000 жетонов!', false);
        showShop();
    } else showNotification('Недостаточно жетонов! Нужно 5000 жетонов.', true);
}

function uploadCustomBanner() {
    if (!userData.hasCustomBanner) { showNotification('Сначала купите эту функцию в магазине!', true); return; }
    document.getElementById('customBannerInput').onchange = function(e) {
        let file = e.target.files[0];
        if (file) {
            let reader = new FileReader();
            reader.onload = function(ev) {
                userData.currentBanner = ev.target.result;
                userData.currentBannerType = 'custom';
                document.getElementById('banner').style.background = 'url(' + ev.target.result + ') center/cover';
                saveUserData();
                showNotification('Пользовательский баннер применен!', false);
                closeBannerPicker();
            };
            reader.readAsDataURL(file);
        }
    };
    document.getElementById('customBannerInput').click();
}

function changeUsername() {
    let newName = prompt('Введите новый юзернейм (только латиница, цифры, _):', userData.username);
    if (!newName) return;
    if (!/^[a-zA-Z0-9_]+$/.test(newName)) { showNotification('Только латиница, цифры и _', true); return; }
    let users = JSON.parse(localStorage.getItem('lovechord_users') || '{}');
    if (users[newName] && newName !== userData.username) { showNotification('Имя уже занято!', true); return; }
    delete users[userData.username];
    userData.username = newName;
    userData.lastUsernameChange = Date.now();
    users[newName] = userData;
    localStorage.setItem('lovechord_users', JSON.stringify(users));
    localStorage.setItem('lovechord_current_user', newName);
    loadUserData();
    loadProfileIcon();
    showNotification('Имя изменено! Следующее изменение через неделю.', false);
}

function checkTasks() {
    for (let t of permanentTasks) {
        if (userData.completedTasks.includes(t.id)) continue;
        let completed = false;
        if (t.id === 'totalGames30' && userData.stats.totalGamesPlayed >= 30) completed = true;
        if (t.id === 'totalGames50' && userData.stats.totalGamesPlayed >= 50) completed = true;
        if (t.id === 'totalGames100' && userData.stats.totalGamesPlayed >= 100) completed = true;
        if (t.id === 'totalGames150' && userData.stats.totalGamesPlayed >= 150) completed = true;
        if (t.id === 'wins30' && userData.stats.wins >= 30) completed = true;
        if (t.id === 'wins50' && userData.stats.wins >= 50) completed = true;
        if (t.id === 'wins100' && userData.stats.wins >= 100) completed = true;
        if (t.id === 'wins150' && userData.stats.wins >= 150) completed = true;
        if (t.id === 'streak5' && userData.gameStreak >= 5) completed = true;
        if (t.id === 'streak10' && userData.gameStreak >= 10) completed = true;
        if (t.id === 'streak15' && userData.gameStreak >= 15) completed = true;
        if (t.id === 'streak20' && userData.gameStreak >= 20) completed = true;
        if (t.id === 'dailyTasks10' && userData.dailyTasksCompletedCount >= 10) completed = true;
        if (t.id === 'dailyTasks15' && userData.dailyTasksCompletedCount >= 15) completed = true;
        if (t.id === 'dailyTasks20' && userData.dailyTasksCompletedCount >= 20) completed = true;
        
        if (completed) {
            userData.completedTasks.push(t.id);
            if (t.rewardType === 'tokens') {
                userData.tokens += parseInt(t.reward);
                showNotification('🎉 "' + t.name + '" выполнено! +' + t.reward + ' жетонов!', false);
            } else if (t.rewardType === 'colors') {
                for (let c of t.rewardData) { if (!userData.unlockedUsernameColors.includes(c)) userData.unlockedUsernameColors.push(c); }
                showNotification('🎉 "' + t.name + '" выполнено! Открыты новые цвета!', false);
            } else if (t.rewardType === 'banner') {
                if (!userData.unlockedBannerImages.includes(t.rewardData)) userData.unlockedBannerImages.push(t.rewardData);
                showNotification('🎉 "' + t.name + '" выполнено! Открыт баннер!', false);
            }
            saveUserData();
            checkAchievements();
            showStats();
        }
    }
}

function loadProfileIcon() {
    let users = JSON.parse(localStorage.getItem('lovechord_users') || '{}');
    let cur = localStorage.getItem('lovechord_current_user');
    if (cur && users[cur]) {
        let icon = document.getElementById('profileIcon');
        if (users[cur].avatar) icon.innerHTML = '<img src="' + users[cur].avatar + '">';
        else { icon.innerHTML = users[cur].username.charAt(0).toUpperCase(); icon.style.fontSize = '24px'; icon.style.fontWeight = 'bold'; }
    }
}

function setupAvatarUpload() {
    document.getElementById('avatar').onclick = () => document.getElementById('avatarInput').click();
    document.getElementById('avatarInput').onchange = function(e) {
        let file = e.target.files[0];
        if (file) {
            let reader = new FileReader();
            reader.onload = function(ev) {
                userData.avatar = ev.target.result;
                saveUserData();
                loadUserData();
                loadProfileIcon();
                showNotification('Аватар обновлен!', false);
            };
            reader.readAsDataURL(file);
        }
    };
}

function showColorPicker() {
    let picker = document.getElementById('colorPicker');
    let opts = document.getElementById('colorOptions');
    opts.innerHTML = '';
    for (let [c, d] of Object.entries(usernameColors)) {
        let owned = userData.unlockedUsernameColors.includes(c);
        let div = document.createElement('div');
        div.className = 'color-option';
        div.style.background = c;
        div.title = d.name;
        if (owned) div.onclick = () => { userData.usernameColor = c; saveUserData(); applyUsernameColor(); showNotification('Цвет ника изменен на ' + d.name + '!', false); closeColorPicker(); };
        else div.onclick = () => showNotification('Купите этот цвет в магазине!', true);
        opts.appendChild(div);
    }
    picker.classList.add('show');
}

function closeColorPicker() { document.getElementById('colorPicker').classList.remove('show'); }

function showBannerPicker() {
    let picker = document.getElementById('bannerPicker');
    let opts = document.getElementById('bannerOptions');
    opts.innerHTML = '';
    for (let b of bannerColors) {
        let owned = userData.unlockedBannerColors.includes(b.color);
        let div = document.createElement('div');
        div.className = 'banner-option';
        div.style.background = b.color;
        div.title = b.name;
        if (owned) div.onclick = () => { userData.currentBanner = b.color; userData.currentBannerType = 'color'; document.getElementById('banner').style.background = b.color; saveUserData(); showNotification('Баннер изменен на ' + b.name + '!', false); closeBannerPicker(); };
        else div.onclick = () => showNotification('Купите этот баннер в магазине!', true);
        opts.appendChild(div);
    }
    for (let [id, d] of Object.entries(bannerImages)) {
        let owned = userData.unlockedBannerImages.includes(id);
        let div = document.createElement('div');
        div.className = 'banner-option';
        div.style.background = 'url(' + d.url + ') center/cover';
        div.title = d.name;
        if (owned) div.onclick = () => { userData.currentBanner = d.url; userData.currentBannerType = 'image'; document.getElementById('banner').style.background = 'url(' + d.url + ') center/cover'; saveUserData(); showNotification('Баннер "' + d.name + '" применен!', false); closeBannerPicker(); };
        else div.onclick = () => showNotification('Купите этот баннер в магазине!', true);
        opts.appendChild(div);
    }
    document.getElementById('customBannerBtn').style.display = userData.hasCustomBanner ? 'block' : 'none';
    picker.classList.add('show');
}

function closeBannerPicker() { document.getElementById('bannerPicker').classList.remove('show'); }

function logout() { localStorage.removeItem('lovechord_current_user'); window.location.href = 'profile.html'; }

function toggleGlobalTheme() {
    if (document.body.classList.contains('light-theme')) {
        document.body.classList.remove('light-theme');
        localStorage.setItem('lovechord_theme', 'dark');
    } else {
        document.body.classList.add('light-theme');
        localStorage.setItem('lovechord_theme', 'light');
    }
}

function loadGlobalTheme() { 
    if (localStorage.getItem('lovechord_theme') === 'light') {
        document.body.classList.add('light-theme');
    } else {
        document.body.classList.remove('light-theme');
    }
}
